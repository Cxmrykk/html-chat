<html lang="en">
  <head>

    />

    <title>HTML Chat</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>

    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        height: 100vh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        font-family: monospace, sans-serif;
        line-height: 1.6;
        padding: 2rem 1rem 1rem 1rem;
        color: #111;
        background: #fafafa;
        overflow: hidden;
      }

      header {
        flex-shrink: 0;
      }

      h1,
      h2,
      h3 {
        margin-top: 0;
      }

      button {
        cursor: pointer;
        font-family: inherit;
        background: #eee;
        border: 1px solid #000;
        padding: 5px 10px;
        color: #000;
      }

      button:hover {
        background: #ccc;
      }

      button:disabled {
        background: #e0e0e0;
        color: #888;
        border-color: #ccc;
        cursor: not-allowed;
      }

      input[type="text"],
      input[type="password"],
      input[type="number"],
      textarea,
      select {
        font-family: inherit;
        padding: 8px;
        border: 1px solid #000;
        box-sizing: border-box;
        width: 100%;
        margin-bottom: 10px;
        background: #fff;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      textarea:disabled {
        background: #e0e0e0;
        color: #555;
        border-color: #999;
        cursor: not-allowed;
      }

      .hidden {
        display: none !important;
      }

      .top-actions {
        position: fixed;
        top: 1rem;
        right: 1rem;
        display: flex;
        gap: 15px;
        z-index: 100;
      }

      .top-btn {
        color: #0055ff;
        text-decoration: underline;
        cursor: pointer;
        font-size: 0.9em;
      }

      .top-btn:hover {
        color: #ff0055;
      }

      .grid {
        display: flex;
        gap: 2rem;
        flex-grow: 1;
        min-height: 0;
        margin-top: 1rem;
      }

      @media (max-width: 768px) {
        .sidebar:not(.hidden)+.main {
          display: none;
        }

        .sidebar,
        .main {
          min-width: 0;
        }

        .sidebar {
          padding-right: 0;
        }
      }

      .sidebar {
        flex: 1;
        min-width: 250px;
        overflow-y: auto;
        padding-right: 10px;
      }

      .main {
        flex: 3;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      #chat-container {
        position: relative;
        flex-grow: 1;
        min-height: 0;
        overflow-y: auto;
        border: 2px solid #000;
        background: #ebebeb;
        padding: 15px;
        margin-bottom: 15px;
      }

      #input-area {
        flex-shrink: 0;
      }

      .msg {
        border-left: 4px solid #000;
        padding-left: 15px;
        margin-bottom: 20px;
        background: #fff;
        padding: 10px 10px 10px 15px;
        border-radius: 0 5px 5px 0;
        box-shadow: 2px 2px 0px #000;
      }

      .msg.editing {
        border-left-style: dashed;
        background: #f5f5f5;
      }

      .msg:last-child {
        margin-bottom: 0;
      }

      .msg.user {
        border-color: #0055ff;
      }

      .msg.assistant {
        border-color: #ff0055;
      }

      .msg.system {
        border-color: #ffaa00;
        background: #fff8e6;
      }

      .msg.error {
        border-color: #c00000;
        background: #ffeeee;
      }

      .msg.file {
        border-color: #00cc66;
        background: #eaffea;
      }

      .msg-meta {
        font-size: 0.85em;
        text-transform: uppercase;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
        display: flex;
        justify-content: space-between;
      }

      .msg-actions button {
        font-size: 0.8em;
        padding: 2px 6px;
        margin-left: 5px;
      }

      .msg-content {
        overflow-wrap: anywhere;
      }

      .msg-content p:first-child {
        margin-top: 0;
      }

      .msg-content p:last-child {
        margin-bottom: 0;
      }

      .msg-content pre {
        padding: 10px;
        border: 1px solid #000;
        overflow-x: auto;
        overflow-y: hidden;
        max-height: none !important;
        border-radius: 0;
      }

      .msg-content code {
        background: #eee;
        padding: 2px 4px;
        color: #000;
      }

      .msg-content pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .msg-content pre[class*="language-"] {
        background: #eee;
        margin: 0.5em 0;
        text-shadow: none;
      }

      .msg-content code[class*="language-"],
      .msg-content pre[class*="language-"] {
        font-family: inherit;
        font-size: 0.9em;
        line-height: 1.6;
        direction: ltr;
      }

      body.ctrl-down .msg-content pre[class*="language-"]:hover {
        background: #e0e0e0;
      }

      body.ctrl-down pre:hover code {
        background: transparent;
      }

      .chat-item {
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px;
        border: 1px solid transparent;
        margin-bottom: 5px;
      }

      .chat-item.active {
        border-color: #000;
        background: #eee;
        font-weight: bold;
      }

      .chat-item-title {
        cursor: pointer;
        flex-grow: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        margin-right: 10px;
      }

      .chat-item-actions {
        flex-shrink: 0;
        display: flex;
      }

      .chat-item-actions button {
        font-size: 0.7em;
        padding: 2px 5px;
        margin-left: 2px;
      }

      .file-progress-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        background: #0055ff;
        width: 0%;
        transition: width 0.3s ease;
      }

      .config-box {
        background: #eee;
        padding: 15px;
        border: 1px solid #000;
        margin-bottom: 20px;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        cursor: pointer;
      }

      body.ctrl-down pre,
      body.ctrl-down code,
      body.ctrl-down .katex,
      body.ctrl-down #settings-heading {
        cursor: pointer !important;
      }

      body.ctrl-down pre:hover,
      body.ctrl-down code:hover,
      body.ctrl-down .katex:hover,
      body.ctrl-down .chat-item:hover,
      body.ctrl-down #settings-heading:hover {
        background: #e0e0e0;
      }

      body.ctrl-down .chat-item-title {
        cursor: copy !important;
      }

      .katex {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
      }

      .role-select {
        appearance: none;
        width: auto;
        margin-bottom: 0;
        font-family: inherit;
        font-size: inherit;
        font-weight: inherit;
        text-transform: inherit;
        color: inherit;
        background: transparent;
        border: 1px solid transparent;
        cursor: pointer;
        padding: 0 4px;
        margin-left: -4px;
        outline: none;
      }

      .role-select:hover {
        background: #eee;
        border-color: #ccc;
      }

      .msg-actions {
        flex-shrink: 0;
      }

      .msg-content table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
        max-width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
      }

      .msg-content th,
      .msg-content td {
        border: 1px solid #ccc;
        padding: 6px 12px;
      }

      .msg-content th {
        background: #eee;
      }

      .active-setting {
        background: #ccc !important;
        border-color: #000 !important;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="top-actions">
      <a id="toggle-title-btn" class="top-btn" title="Alt+O" onclick="toggleTitle()">[show title]</a>
      <a id="toggle-sidebar-btn" class="top-btn" title="Alt+P" onclick="toggleSidebar()">[hide sidebar]</a>
    </div>

    <header id="header" class="hidden">
      <h1>HTML Chat</h1>
      <p>Browser-based chat for OpenAI-compatible APIs.</p>
    </header>

    <div class="grid">
      <aside class="sidebar" id="sidebar">
        <div class="config-box">
          <h3 id="settings-heading" title="Ctrl+Click for Super Secret Settings">Settings</h3>
          <label>Base URL</label>
          <input type="text" id="cfg-url" placeholder="https://api.openai.com/v1" />
          <label>API Key</label>
          <input type="password" id="cfg-key" placeholder="sk-..." />
          <label>Models (use commas)</label>
          <input type="text" id="cfg-models" placeholder="gpt-4o,gpt-3.5-turbo" />
          <label class="checkbox-label">
            <input type="checkbox" id="cfg-godmode" />
            <strong>Execute JavaScript</strong>
          </label>
          <button onclick="saveConfig()">Save</button>
          <button onclick="importChats()">Import</button>
          <button onclick="exportChats()">Export</button>
        </div>

        <div style="margin-bottom: 20px">
          <div style="display: flex; justify-content: space-between; align-items: center">
            <h3>Your Chats</h3>
            <button onclick="handleNewChatClick(event)" title="New: Alt+T ↔ Import: Alt+Click">+ New</button>
          </div>
          <div id="chat-list"></div>
        </div>

        <div>
          <div style="display: flex; justify-content: space-between; align-items: center">
            <h3>Your Files</h3>
            <button onclick="handleUploadClick()" title="Upload Files for Vector Search">+ Upload</button>
          </div>
          <div id="file-list"></div>
        </div>
      </aside>

      <main class="main">
        <div id="chat-container"></div>
        <div id="input-area">
          <div style="display: flex; gap: 10px; margin-bottom: 10px">
            <select id="model-select" style="width: auto; margin: 0" onchange="saveLastModel()"></select>
            <button
              id="send-btn"
              onclick="sendMessage()"
              title="Ctrl+Enter / Cmd+Enter"
              style="flex-grow: 1; font-weight: bold"
            >
              Send
            </button>
            <button
              id="save-edit-btn"
              class="hidden"
              onclick="saveGlobalEdit()"
              title="Ctrl+Enter / Cmd+Enter"
              style="flex-grow: 1; font-weight: bold"
            >
              Save
            </button>
            <button
              id="cancel-edit-btn"
              class="hidden"
              onclick="cancelGlobalEdit()"
              style="flex-grow: 1; font-weight: bold"
            >
              Cancel
            </button>
            <button
              id="secret-save-btn"
              class="hidden"
              onclick="saveSuperSecretSetting()"
              title="Ctrl+Enter / Cmd+Enter"
              style="flex-grow: 1; font-weight: bold"
            >
              Save
            </button>
            <button
              id="secret-reset-btn"
              class="hidden"
              onclick="resetSuperSecretSetting()"
              style="flex-grow: 1; font-weight: bold"
            >
              Reset
            </button>
            <button
              id="secret-cancel-btn"
              class="hidden"
              onclick="cancelSuperSecretSetting()"
              style="flex-grow: 1; font-weight: bold"
            >
              Cancel
            </button>

          <textarea id="chat-input" placeholder="Type your prompt here..."></textarea>
        </div>
      </main>
    </div>

    <script>
      // --- PURE UTILITIES ---
      const AsyncFunction = Object.getPrototypeOf(async function () {}).constructor;

      const $ = (s) => document.querySelector(s);

      const escapeHTML = (str) =>
        (str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      function pickFiles(multiple = true) {
        return new Promise((resolve) => {
          const input = document.createElement("input");
          input.type = "file";
          input.multiple = multiple;
          input.addEventListener("change", (e) =>
            resolve(Array.from(e.target.files)),
          );
          input.addEventListener("cancel", () => resolve([]));
          input.click();
        });
      }

      function readFileText(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = (e) => reject(e);
          reader.readAsText(file);
        });
      }

      function cosSim(a, b) {
        let dot = 0,
          magA = 0,
          magB = 0;
        for (let i = 0; i < a.length; i++) {
          dot += a[i] * b[i];
          magA += a[i] * a[i];
          magB += b[i] * b[i];
        }
        if (magA === 0 || magB === 0) return 0;
        return dot / (Math.sqrt(magA) * Math.sqrt(magB));
      }

      function encodeVectorToBase64(vector) {
        if (!vector || !vector.length) return null;
        const f32 = new Float32Array(vector);
        const u8 = new Uint8Array(f32.buffer);
        let binary = "";
        for (let i = 0; i < u8.byteLength; i++) {
          binary += String.fromCharCode(u8[i]);
        }
        return btoa(binary);
      }

      function decodeBase64ToVector(base64) {
        if (!base64) return null;
        const binary = atob(base64);
        const u8 = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          u8[i] = binary.charCodeAt(i);
        }
        // Return typed array directly to compress DB payload drastically
        return new Float32Array(u8.buffer);
      }

      // --- CONSTANTS & DEFAULTS ---
      const DEFAULT_GOD_MODE_PROMPT = [
        "[SYSTEM OVERRIDE: CODE EXECUTION ENABLED]",
        "You are executing directly inside the user's web browser (JS console). You are NOT in a sandboxed cloud environment. You are NOT in Node.js or Python. You have full, unrestricted access to the user's 'window', 'document', 'navigator', 'localStorage', etc.",
        "",
        "However, to execute code, you MUST use this exact syntax (the return value is sent back to you):",
        "<run>",
        "// browser-side JS goes here",
        "return data.toString();",
        "</run>",
        "",
        "CRITICAL RULES FOR TOOL USE:",
        "1. DO NOT CALCULATE MANUALLY. If the user asks a math, logic, or data question, you MUST use a <run> block to compute it. Do not trust your own internal math.",
        '2. NO FAKE CODE, MOCKS, OR HARDCODING. Your JavaScript MUST contain actual logic, algorithms, math, or simulations. DO NOT write "simplified" checks or hardcode the answer you already suspect. If you need to search for a counterexample, write a GENUINE exhaustive search. The code itself must do the actual work to prove the answer.',
        "3. VANILLA JS LIMITATIONS. You are in a browser. You do not have Python's `itertools`, `numpy`, or `scipy`. If you need combinations, permutations, matrix operations, or deep equality checks, you MUST implement them yourself.",
        "4. STATE PERSISTENCE. Each <run> block executes in a fresh async function scope. Variables declared with `let` or `const` will NOT persist between runs. To save state across multiple runs, attach it to the global `window` object (e.g., `window.myState = ...`).",
        "5. ITERATIVE PROBLEM SOLVING. If a problem is too complex for one script, break it down. Write a <run> block to generate data, save it to `window`, and then write a second <run> block to process it. ",
        "6. DEFER YOUR ANSWER. If you output a <run> block, DO NOT attempt to answer the user's prompt in the same message. Output ONLY your thought process and the <run> block.",
        "7. WAIT FOR THE RESULT. The system will execute your code and return the result in the next message. If your code throws an error, DO NOT apologize—just write another <run> block to fix it and try again.",
        "8. DELIVER THE FINAL ANSWER ONLY AFTER EXECUTION. Unless an error is spotted, once you have the results write your final response to the user and DO NOT include any <run> tags.",
        "9. NEVER use Node.js modules (require, os, fs). They do not exist here.",
        "10. NEVER use markdown backticks (```) around the <run> tags. Just output the raw tags.",
        "",
        "EXAMPLE WORKFLOW:",
        "User: What is the square root of 9999?",
        "Assistant: I need to compute this using JavaScript.",
        "<run>",
        "return Math.sqrt(9999);",
        "</run>",
        "User: **Execution Result:**",
        "```text",
        "Return: 99.99499987499375",
        "```",
        "Assistant: The square root of 9999 is 99.994999875.",
      ].join("\n");

      const SETTING_DEFAULTS = {
        godModePrompt: {
          default: DEFAULT_GOD_MODE_PROMPT,
          tooltip:
            "System prompt used when God Mode is enabled (execute JavaScript).",
          category: "LLM Behavior",
        },
        temperature: {
          default: "",
          tooltip: "Controls randomness (0.0 to 2.0).",
          category: "LLM Behavior",
        },
        top_p: {
          default: "",
          tooltip: "Nucleus sampling (0.0 to 1.0).",
          category: "LLM Behavior",
        },
        max_tokens: {
          default: "",
          tooltip: "Maximum number of tokens to generate.",
          category: "LLM Behavior",
        },
        frequency_penalty: {
          default: "",
          tooltip: "Penalizes new tokens based on existing frequency (-2.0 to 2.0).",
          category: "LLM Behavior",
        },
        presence_penalty: {
          default: "",
          tooltip: "Penalizes new tokens based on presence (-2.0 to 2.0).",
          category: "LLM Behavior",
        },
        streamResponse: {
          default: "true",
          tooltip: "Stream responses chunk-by-chunk (true/false).",
          category: "LLM Behavior",
        },
        embeddingsUrl: {
          default: "",
          tooltip: "Custom base URL for embeddings (e.g. LiteLLM or OpenAI).",
          category: "API & Connections",
        },
        embeddingsKey: {
          default: "",
          tooltip: "API Key for the custom embeddings URL.",
          category: "API & Connections",
        },
        embeddingsModel: {
          default: "",
          tooltip: "Model used for processing local RAG commands. Empty to disable.",
          category: "API & Connections",
        },
        fileWrapperFunc: {
          default: `const extMatch = (fileName || "").match(/\\.([^.]+)$/);\nconst ext = extMatch ? extMatch[1] : "txt";\nconst blockTicks = (fileContent || "").includes("\`\`\`") ? "\`\`\`\`" : "\`\`\`";\nreturn \`\\\`\${fileName}\\\`:\\n\\n\${blockTicks}\${ext}\\n\${fileContent}\\n\${blockTicks}\`;`,
          tooltip:
            "JS Function [Vars: fileContent, fileName]: Wrap the final file content/chunks before inserting into the prompt.",
          category: "RAG & Document Processing",
        },
        maxRagTokens: {
          default: "5000",
          tooltip: "Maximum estimated tokens to retrieve per file message.",
          category: "RAG & Document Processing",
        },
        ragThreshold: {
          default: "0.0",
          tooltip: "Min similarity threshold (0.0 to 1.0). 0.0 allows anything.",
          category: "RAG & Document Processing",
        },
        chunkMaxTokens: {
          default: "1024",
          tooltip:
            "Maximum tokens allowed per single chunk. Oversized chunks are discarded.",
          category: "RAG & Document Processing",
        },
        chunkBatchSize: {
          default: "100",
          tooltip: "Max chunks sent to Embeddings API at once.",
          category: "RAG & Document Processing",
        },
        chunkBatchMaxTokens: {
          default: "8192",
          tooltip: "Max estimated tokens sent to Embeddings API per batch.",
          category: "RAG & Document Processing",
        },
        maxVisibleChats: {
          default: "",
          tooltip: "Maximum number of chats displayed at once in the sidebar.",
          category: "UI & Display",
        },
        maxVisibleFiles: {
          default: "",
          tooltip: "Maximum number of files displayed at once in the sidebar.",
          category: "UI & Display",
        },
      };

      const FILE_SETTING_DEFAULTS = {
        fileText: {
          default: "",
          tooltip: "The full textual content of the file. Edit and save to update.",
          category: "Overrides",
        },
        fileWrapperFunc: {
          default: "",
          tooltip:
            "Override global File Wrapper Function for this file. [Vars: fileContent, fileName]",
          category: "Overrides",
        },
        maxRagTokens: {
          default: "",
          tooltip: "Override global max RAG tokens for this file.",
          category: "Overrides",
        },
        ragThreshold: {
          default: "",
          tooltip: "Override global match threshold for this file. (0.0 to 1.0)",
          category: "Overrides",
        },
        chunkMaxTokens: {
          default: "",
          tooltip: "Override global max tokens per chunk for this file.",
          category: "Overrides",
        },
        customChunks: {
          default: "",
          tooltip: "A JSON array to bypass all chunking logic.",
          category: "Chunk Generation",
        },
        customChunker: {
          default: `// Variables: 'fileContents' (full file string)\nconst chunkSize = 1000;\nconst chunkOverlap = 200;\nconst chunks = [];\nlet start = 0;\nwhile (start < fileContents.length) {\n  let end = start + chunkSize;\n  if (end > fileContents.length) end = fileContents.length;\n  chunks.push(fileContents.substring(start, end));\n  if (end >= fileContents.length) break;\n  start = end - chunkOverlap;\n}\nreturn chunks;`,
          tooltip:
            "JS Function [Vars: fileContents]: Create an array of chunks (strings or objects). Default splits by 1000 chars with a 200 char overlap.",
          category: "Chunk Generation",
        },
        retrievalFunc: {
          default: `return chunk;`,
          tooltip:
            "JS Function [Vars: chunk, fileContents]: Step 1. Process or expand context from the raw chunk item. Return null to skip.",
          category: "Post-Retrieval Processing",
        },
        dedupFunc: {
          default: `return currentData === existingData;`,
          tooltip:
            "JS Function [Vars: currentData, existingData]: Step 2. Return true if current chunk's data is a duplicate of an existing chunk's data.",
          category: "Post-Retrieval Processing",
        },
        mergeChunksFunc: {
          default: `return finalChunks.map(c => typeof c === 'string' ? c : JSON.stringify(c)).join("...");`,
          tooltip:
            "JS Function [Vars: finalChunks]: Step 3. Combine the array of final chunks into a single string for the prompt.",
          category: "Post-Retrieval Processing",
        },
      };

      // --- INDEXEDDB WRAPPER ---
      const DB_NAME = "HTMLChatDB";
      const STORE_NAME = "keyval";

      function getDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result);
          request.onupgradeneeded = (e) => {
            e.target.result.createObjectStore(STORE_NAME);
          };
        });
      }

      async function dbGet(key) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readonly");
          const store = transaction.objectStore(STORE_NAME);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function dbSet(key, val) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          const store = transaction.objectStore(STORE_NAME);
          const request = store.put(val, key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      async function dbDelete(key) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          const store = transaction.objectStore(STORE_NAME);
          const request = store.delete(key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      async function dbGetByPrefix(prefix) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readonly");
          const store = transaction.objectStore(STORE_NAME);
          const range = IDBKeyRange.bound(prefix, prefix + "\uffff");

          // Use a cursor instead of getAll to prevent Chromium IPC message size limits
          // from crashing the browser when fetching very large arrays of embedded vectors.
          const request = store.openCursor(range);
          const results = [];
          request.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
              results.push(cursor.value);
              cursor.continue();
            } else {
              resolve(results);
            }
          };
          request.onerror = () => reject(request.error);
        });
      }

      async function dbDeleteByPrefix(prefix) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          const store = transaction.objectStore(STORE_NAME);
          const range = IDBKeyRange.bound(prefix, prefix + "\uffff");
          const request = store.delete(range);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      async function dbSetMultiple(entries) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          const store = transaction.objectStore(STORE_NAME);
          for (const [key, val] of entries) {
            store.put(val, key);
          }
          transaction.oncomplete = () => resolve();
          transaction.onerror = () => reject(transaction.error);
        });
      }

      async function saveState() {
        dbSet("mf_config", config);

      // --- CONFIGURATION & SUPER SECRET SETTINGS ---
      function saveConfig() {
        const oldRAG = config.embeddingsModel;

        config = {
          ...config,
          url: $("#cfg-url").value.trim(),
          key: $("#cfg-key").value.trim(),
          models: $("#cfg-models").value.trim(),
          godMode: $("#cfg-godmode").checked,
        };

        const newRAG = config.embeddingsModel;
        if (oldRAG !== newRAG) {
          resetAllFileEmbeddings();
        }

        saveState();
        updateModelDropdown();
        renderApp(true);
        updateTokenCount();
        alert("Settings saved, don't fuck them up.");

      function selectSuperSecretSetting(key) {
        activeSuperSecretSetting = key;
        uncommittedSuperSecretValue = null;
        const area = $("#chat-input");
        area.value =
          config[key] !== undefined && config[key] !== ""
            ? config[key]
            : SETTING_DEFAULTS[key].default;
        renderApp(true);
        area.focus();
      }

      function saveSuperSecretSetting() {
        if (isAdvancedRAGSettingsOpen) return saveAdvancedRAGSetting();

        if (!activeSuperSecretSetting) return;
        let val = $("#chat-input").value;
        const key = activeSuperSecretSetting;
        const oldRAG = config.embeddingsModel;

        if (
          key === "godModePrompt" ||
          key === "embeddingsModel" ||
          key === "embeddingsUrl" ||
          key === "embeddingsKey" ||
          key === "streamResponse" ||
          key === "fileWrapperFunc"
        ) {
          config[key] = val;
        } else {
          if (val.trim() === "") {
            config[key] = "";
          } else {
            const parsed = parseFloat(val);
            config[key] = isNaN(parsed) ? "" : parsed;
          }
        }

        const newRAG = config.embeddingsModel;
        if (oldRAG !== newRAG) {
          resetAllFileEmbeddings();
        }

        saveState();
        activeSuperSecretSetting = null;
        uncommittedSuperSecretValue = null;
        renderApp(true);
        updateTokenCount();
      }

      function resetSuperSecretSetting() {
        if (isAdvancedRAGSettingsOpen) return resetAdvancedRAGSetting();

        if (!activeSuperSecretSetting) return;
        const key = activeSuperSecretSetting;
        const oldRAG = config.embeddingsModel;
        config[key] = SETTING_DEFAULTS[key].default;

        const newRAG = config.embeddingsModel;
        if (oldRAG !== newRAG) resetAllFileEmbeddings();

        saveState();
        activeSuperSecretSetting = null;
        uncommittedSuperSecretValue = null;
        renderApp(true);
        updateTokenCount();
      }

      function cancelSuperSecretSetting() {
        if (isAdvancedRAGSettingsOpen) return cancelAdvancedRAGSetting();

        activeSuperSecretSetting = null;
        uncommittedSuperSecretValue = null;
        renderApp(true);
      }

      function resetAllSuperSecretSettings() {
        if (confirm("Reset ALL Advanced parameters to default?")) {
          const oldRAG = config.embeddingsModel;

          for (let key in SETTING_DEFAULTS) {
            config[key] = SETTING_DEFAULTS[key].default;
          }

          const newRAG = config.embeddingsModel;
          if (oldRAG !== newRAG) resetAllFileEmbeddings();

          saveState();
          if (activeSuperSecretSetting) {
            uncommittedSuperSecretValue = null;
            $("#chat-input").value =
              config[activeSuperSecretSetting] !== undefined
                ? config[activeSuperSecretSetting]
                : SETTING_DEFAULTS[activeSuperSecretSetting].default;
          }
          renderApp(true);
          updateTokenCount();
        }
      }

      // --- ADVANCED RAG SPECIFIC FUNCTIONS ---
      async function selectAdvancedRAGSetting(key) {
        activeAdvancedRAGSetting = key;
        uncommittedAdvancedRAGValue = null;
        const area = $("#chat-input");

        if (key === "fileText") {
          const data = await dbGet(`mf_filedata_${activeAdvancedRAGFileId}`);
          area.value = data ? data.text : "";
        } else {
          const meta = files.find((f) => f.id === activeAdvancedRAGFileId);
          if (meta) {
            area.value =
              meta[key] !== undefined && meta[key] !== ""
                ? meta[key]
                : FILE_SETTING_DEFAULTS[key].default;
          }
        }
        renderApp(true);
        area.focus();
      }

      async function saveAdvancedRAGSetting() {
        if (!activeAdvancedRAGSetting || !activeAdvancedRAGFileId) return;
        let val = $("#chat-input").value;
        const key = activeAdvancedRAGSetting;
        const meta = files.find((f) => f.id === activeAdvancedRAGFileId);
        if (!meta) return;

        if (key === "fileText") {
          const data = await dbGet(`mf_filedata_${activeAdvancedRAGFileId}`);
          if (data) {
            data.text = val;
            meta.textLength = val.length;
            await dbSet(`mf_filedata_${activeAdvancedRAGFileId}`, data);
            await refreshFileChunks(meta.id);
          }
        } else {
          const requiresReembed = ["customChunks", "customChunker"].includes(key);
          const oldVal = meta[key];

          if (
            [
              "customChunks",
              "customChunker",
              "retrievalFunc",
              "dedupFunc",
              "mergeChunksFunc",
              "fileWrapperFunc",
            ].includes(key)
          ) {
            meta[key] = val;
          } else {
            if (val.trim() === "") {
              meta[key] = "";
            } else {
              const parsed = parseFloat(val);
              meta[key] = isNaN(parsed) ? "" : parsed;
            }
          }

          if (requiresReembed && oldVal !== meta[key]) {
            await refreshFileChunks(meta.id);
          }
        }

        saveState();
        activeAdvancedRAGSetting = null;
        uncommittedAdvancedRAGValue = null;
        renderApp(true);
        updateTokenCount();
      }

      async function resetAdvancedRAGSetting() {
        if (!activeAdvancedRAGSetting || !activeAdvancedRAGFileId) return;
        const key = activeAdvancedRAGSetting;
        if (key === "fileText") return;

        const meta = files.find((f) => f.id === activeAdvancedRAGFileId);
        if (!meta) return;

        const requiresReembed = ["customChunks", "customChunker"].includes(key);
        const oldVal = meta[key];

        meta[key] = FILE_SETTING_DEFAULTS[key].default;

        if (requiresReembed && oldVal !== meta[key]) {
          await refreshFileChunks(meta.id);
        }

        saveState();
        activeAdvancedRAGSetting = null;
        uncommittedAdvancedRAGValue = null;
        renderApp(true);
        updateTokenCount();
      }

      function cancelAdvancedRAGSetting() {
        activeAdvancedRAGSetting = null;
        uncommittedAdvancedRAGValue = null;
        renderApp(true);
      }

      async function resetAllAdvancedRAGSettings() {
        if (!activeAdvancedRAGFileId) return;
        if (confirm("Reset ALL Advanced RAG parameters to default for this file?")) {
          const meta = files.find((f) => f.id === activeAdvancedRAGFileId);
          if (!meta) return;

          let requiresReembed = false;
          for (let key in FILE_SETTING_DEFAULTS) {
            if (key === "fileText") continue;
            if (
              ["customChunks", "customChunker"].includes(key) &&
              meta[key] !== undefined &&
              meta[key] !== "" &&
              meta[key] !== FILE_SETTING_DEFAULTS[key].default
            ) {
              requiresReembed = true;
            }
            meta[key] = FILE_SETTING_DEFAULTS[key].default;
          }

          if (requiresReembed) {
            await refreshFileChunks(meta.id);
          }

          saveState();
          if (activeAdvancedRAGSetting) {
            uncommittedAdvancedRAGValue = null;
            if (activeAdvancedRAGSetting === "fileText") {
              const data = await dbGet(`mf_filedata_${meta.id}`);
              $("#chat-input").value = data ? data.text : "";
            } else {
              $("#chat-input").value =
                meta[activeAdvancedRAGSetting] !== undefined
                  ? meta[activeAdvancedRAGSetting]
                  : FILE_SETTING_DEFAULTS[activeAdvancedRAGSetting].default;
            }
          }
          renderApp(true);
          updateTokenCount();
        }
      }

      // --- IMPORT & EXPORT JSON ---
      function exportChats() {
        const dataStr = JSON.stringify(chats, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `html-chat-export-${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function exportSingleChat(id) {
        const chat = chats.find((c) => c.id === id);
        if (!chat) return;

        const dataStr = JSON.stringify([chat], null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `chat-timestamp-${chat.id}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function importChats() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const importedChats = JSON.parse(event.target.result);
              if (!Array.isArray(importedChats))
                throw new Error("Invalid format: expected an array of chats.");

              let addedCount = 0;
              const existingIds = new Set(chats.map((c) => c.id));

              for (const chat of importedChats) {
                if (!chat.id || !chat.messages) continue;
                if (!existingIds.has(chat.id)) {
                  chats.push(chat);
                  existingIds.add(chat.id);
                  await dbSet(`mf_chat_${chat.id}`, chat);
                  addedCount++;
                }
              }

              chats.sort((a, b) => Number(b.id) - Number(a.id));
              if (!currentChatId && chats.length > 0) currentChatId = chats[0].id;

              saveState();
              renderApp();
              alert(`Successfully imported ${addedCount} new chat(s).`);
            } catch (err) {
              alert("Failed to import chats: " + err.message);
            }
          };
          reader.readAsText(file);
        };
        input.click();
      }

      // --- CHAT & FILE ACTIONS (CRUD) ---
      function suspendSuperSecretSettings() {
        if (isSuperSecretSettingsOpen) {
          if (activeSuperSecretSetting) {
            uncommittedSuperSecretValue = $("#chat-input").value;
          }
          isSuperSecretSettingsOpen = false;
        }
        if (isAdvancedRAGSettingsOpen) {
          if (activeAdvancedRAGSetting) {
            uncommittedAdvancedRAGValue = $("#chat-input").value;
          }
          isAdvancedRAGSettingsOpen = false;
        }
      }

      function handleNewChatClick(e) {
        if (e.altKey) {
          e.preventDefault();
          importChats();
        } else {
          newChat();
        }
      }

      function newChat() {
        suspendSuperSecretSettings();
        resetEditState();
        const id = Date.now().toString();
        chats.unshift({ id, title: "New Chat", messages: [] });
        currentChatId = id;
        if (window.innerWidth <= 768) {
          isSidebarHidden = true;
          applySidebarState();
        }
        invalidateTokenCache();
        saveState();
        renderApp();
        updateTokenCount();
      }

      function loadChat(id) {
        suspendSuperSecretSettings();
        resetEditState();
        currentChatId = id;
        if (window.innerWidth <= 768) {
          isSidebarHidden = true;
          applySidebarState();
        }
        invalidateTokenCache();
        saveState();
        renderApp();
      }

      function deleteChat(id) {
        suspendSuperSecretSettings();
        resetEditState();
        chats = chats.filter((c) => c.id !== id);
        if (currentChatId === id) currentChatId = chats.length ? chats[0].id : null;
        invalidateTokenCache();
        saveState();
        renderApp();
      }

      function renameChat(id) {
        const chat = chats.find((c) => c.id === id);
        const newTitle = prompt("Rename chat:", chat.title);
        if (newTitle) {
          chat.title = newTitle.trim();
          saveState();
          renderChatList();
        }
      }

      function forkChat(msgIndex) {
        suspendSuperSecretSettings();
        resetEditState();
        const chat = chats.find((c) => c.id === currentChatId);
        const newId = Date.now().toString();
        chats.unshift({
          id: newId,
          title: chat.title + " (Forked)",
          messages: JSON.parse(JSON.stringify(chat.messages.slice(0, msgIndex + 1))),
        });
        currentChatId = newId;
        invalidateTokenCache();
        saveState();
        renderApp();
      }

      function retryMessage(msgIndex) {
        resetEditState();
        const chat = chats.find((c) => c.id === currentChatId);
        const msg = chat.messages[msgIndex];

        if (msg.role === "file") {
          chat.messages = chat.messages.slice(0, msgIndex + 1);
          invalidateTokenCache();
          saveState();
          renderCurrentChat();
          sendMessage();
        } else {
          $("#chat-input").value = msg.content;
          chat.messages = chat.messages.slice(0, msgIndex);
          invalidateTokenCache();
          saveState();
          renderCurrentChat();
          sendMessage();
        }
      }

      function deleteMessage(msgIndex) {
        if (editingMessageIndex === msgIndex) cancelGlobalEdit();
        else if (editingMessageIndex !== null && editingMessageIndex > msgIndex) {
          editingMessageIndex--;
        }
        chats.find((c) => c.id === currentChatId).messages.splice(msgIndex, 1);
        invalidateTokenCache();
        saveState();
        renderCurrentChat();
      }

      async function handleUploadClick() {
        const picked = await pickFiles(true);
        if (!picked || !picked.length) return;
        for (const f of picked) {
          const text = await readFileText(f);
          await uploadFile(f.name, text);
        }
      }

      async function reuploadFile(id) {
        const picked = await pickFiles(false);
        if (!picked || !picked.length) return;
        const text = await readFileText(picked[0]);
        const meta = files.find((f) => f.id === id);
        await uploadFile(meta ? meta.name : picked[0].name, text, id);
      }

      async function uploadFile(name, text, existingId = null) {
        let id =
          existingId || Date.now().toString() + Math.floor(Math.random() * 1000);
        let meta = files.find((f) => f.id === id);

        if (!meta) {
          let baseName = name;
          let counter = 1;
          while (files.some((f) => f.name === name)) {
            name = `${baseName} (${counter++})`;
          }
          meta = {
            id,
            name,
            progress: 0,
            exactProgress: 0,
            isEmbedding: false,
            chunkCount: 0,
            embeddedCount: 0,
            textLength: text.length,
          };
          files.unshift(meta);
          await dbSet(`mf_filedata_${id}`, { id, name, text });
        } else {
          meta.textLength = text.length;
          const data = await dbGet(`mf_filedata_${id}`);
          data.text = text;
          await dbSet(`mf_filedata_${id}`, data);
          await refreshFileChunks(id);
        }

        saveState();
        renderFileList();
      }

      async function deleteFile(id) {
        if (isAdvancedRAGSettingsOpen && activeAdvancedRAGFileId === id) {
          toggleAdvancedRAGSettings(null);
        }
        files = files.filter((f) => f.id !== id);

        // Clean up normalized records
        await dbDelete(`mf_filedata_${id}`);
        await dbDeleteByPrefix(`mf_chunk_${id}_`);

        saveState();
        renderFileList();
      }

      async function toggleEmbedding(id) {
        const meta = files.find((f) => f.id === id);
        if (!meta) return;
        if (!config.embeddingsModel || config.embeddingsModel.trim() === "") {
          alert("Please configure an embeddings model in Settings first.");
          return;
        }

        meta.isEmbedding = !meta.isEmbedding;

        if (!meta.isEmbedding) {
          // Abort active fetch requests cleanly when pausing
          if (embeddingAbortControllers[id]) {
            embeddingAbortControllers[id].abort();
            delete embeddingAbortControllers[id];
          }
          meta.embeddingSpeed = null;
          meta.embeddingEta = null;
        }

        saveState();
        renderFileList();
        renderApp(true);

        if (meta.isEmbedding) {
          // Wait for any previous loop to finish cleaning up if spam-clicked
          while (meta._embeddingLoopActive) {
            await new Promise((r) => setTimeout(r, 50));
          }
          // Verify it wasn't paused again while waiting
          if (meta.isEmbedding) {
            startEmbeddingLoop(id);
          }
        }
      }

      async function attemptChunking() {
        if (!activeAdvancedRAGFileId) return;
        const meta = files.find((f) => f.id === activeAdvancedRAGFileId);
        const data = await dbGet(`mf_filedata_${activeAdvancedRAGFileId}`);
        if (!meta || !data) return;

        const text = data.text || "";
        let chunks = [];

        const chunkerCode =
          meta.customChunker && meta.customChunker.trim() !== ""
            ? meta.customChunker
            : FILE_SETTING_DEFAULTS.customChunker.default;

        try {
          const fn = new AsyncFunction("fileContents", "config", chunkerCode);
          const res = await fn(text, config);
          if (Array.isArray(res))
            chunks = res.filter((c) => c !== null && c !== undefined);
        } catch (e) {
          alert("Error executing customChunker: " + e.message);
          return;
        }

        meta.customChunks = JSON.stringify(chunks, null, 2);
        saveState();
        await refreshFileChunks(meta.id);

        if (activeAdvancedRAGSetting === "customChunks") {
          await selectAdvancedRAGSetting("customChunks");
        } else {
          renderApp(true);
        }
      }

      function toggleAdvancedEmbedding() {
        if (!activeAdvancedRAGFileId) return;
        toggleEmbedding(activeAdvancedRAGFileId);
      }

      function resetEditState() {
        editingMessageIndex = null;
        const area = $("#chat-input");
        if (area) {
          area.style.whiteSpace = "";
          area.style.overflowX = "";
          if (!isSuperSecretSettingsOpen && !isAdvancedRAGSettingsOpen) {
            area.value = "";
            area.style.height = promptHeight;
          }
        }
      }

      function startGlobalEdit(index) {
        const prevIdx = editingMessageIndex;
        editingMessageIndex = index;

        if (prevIdx !== null) updateMessageInDOM(prevIdx);
        updateMessageInDOM(index);

        const chat = chats.find((c) => c.id === currentChatId);
        const msg = chat.messages[index];
        const area = $("#chat-input");

        area.value =
          msg.role === "file" && msg.mode === "embed"
            ? msg.prompt || ""
            : msg.content;
        applyInputAreaState();
        area.focus();
      }

      function saveGlobalEdit() {
        if (editingMessageIndex === null) return;
        const chat = chats.find((c) => c.id === currentChatId);
        const msg = chat.messages[editingMessageIndex];

        if (msg.role === "file") {
          if (msg.mode === "embed") {
            msg.prompt = $("#chat-input").value;
            const tEl = document.querySelector(
              `.msg[data-index="${editingMessageIndex}"] .embed-cfg-tokens`,
            );
            if (tEl) msg.maxTokens = parseInt(tEl.value, 10) || 5000;

            const thEl = document.querySelector(
              `.msg[data-index="${editingMessageIndex}"] .embed-cfg-threshold`,
            );
            if (thEl) msg.ragThreshold = parseFloat(thEl.value) || 0.0;
          } else {
            msg.content = $("#chat-input").value;
            msg.approxTokens = Math.ceil(msg.content.length / 4);
          }
        } else {
          msg.content = $("#chat-input").value;
        }

        invalidateTokenCache();
        saveState();
        endGlobalEdit();
      }

      function cancelGlobalEdit() {
        endGlobalEdit();
      }

      function endGlobalEdit() {
        const idx = editingMessageIndex;
        resetEditState();
        if (idx !== null) updateMessageInDOM(idx);
        applyInputAreaState();
      }

      function toggleGlobalWrap() {
        const area = $("#chat-input");
        area.style.whiteSpace = area.style.whiteSpace === "pre" ? "pre-wrap" : "pre";
        area.style.overflowX = area.style.whiteSpace === "pre" ? "auto" : "hidden";
      }

      function toggleSuperSecretSettings() {
        if (isAdvancedRAGSettingsOpen) {
          if (activeAdvancedRAGSetting) {
            uncommittedAdvancedRAGValue = $("#chat-input").value;
          }
          isAdvancedRAGSettingsOpen = false;
          activeAdvancedRAGSetting = null;
          activeAdvancedRAGFileId = null;
        }

        isSuperSecretSettingsOpen = !isSuperSecretSettingsOpen;
        if (!isSuperSecretSettingsOpen) {
          activeSuperSecretSetting = null;
          uncommittedSuperSecretValue = null;
          $("#chat-input").value = "";
        } else {
          if (activeSuperSecretSetting) {
            const area = $("#chat-input");
            if (uncommittedSuperSecretValue !== null) {
              area.value = uncommittedSuperSecretValue;
            } else {
              area.value =
                config[activeSuperSecretSetting] !== "" &&
                config[activeSuperSecretSetting] !== undefined
                  ? config[activeSuperSecretSetting]
                  : SETTING_DEFAULTS[activeSuperSecretSetting].default;
            }
          }
        }
        renderCurrentChat();
        applyInputAreaState();
      }

      async function toggleAdvancedRAGSettings(id = null) {
        if (isSuperSecretSettingsOpen) toggleSuperSecretSettings();

        if (id === null && isAdvancedRAGSettingsOpen) {
          if (activeAdvancedRAGSetting) {
            uncommittedAdvancedRAGValue = $("#chat-input").value;
          }
          isAdvancedRAGSettingsOpen = false;
          $("#chat-input").value = "";
          renderCurrentChat();
          applyInputAreaState();
          return;
        }

        if (id !== null) {
          if (isAdvancedRAGSettingsOpen && activeAdvancedRAGFileId === id) {
            if (activeAdvancedRAGSetting) {
              uncommittedAdvancedRAGValue = $("#chat-input").value;
            }
            isAdvancedRAGSettingsOpen = false;
            $("#chat-input").value = "";
          } else {
            if (isAdvancedRAGSettingsOpen && activeAdvancedRAGSetting) {
              uncommittedAdvancedRAGValue = $("#chat-input").value;
            }
            const isReopeningSame = activeAdvancedRAGFileId === id;
            isAdvancedRAGSettingsOpen = true;
            activeAdvancedRAGFileId = id;

            if (!isReopeningSame) {
              activeAdvancedRAGSetting = null;
              uncommittedAdvancedRAGValue = null;
              $("#chat-input").value = "";
            } else {
              if (activeAdvancedRAGSetting) {
                const area = $("#chat-input");
                if (uncommittedAdvancedRAGValue !== null) {
                  area.value = uncommittedAdvancedRAGValue;
                } else {
                  if (activeAdvancedRAGSetting === "fileText") {

                    area.value = data ? data.text : "";
                  } else {

                    area.value =
                      meta &&
                      meta[activeAdvancedRAGSetting] !== undefined &&

          }

        renderCurrentChat();
