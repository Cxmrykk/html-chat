<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

      rel="manifest"
      href='data:application/json,{"name":"HTML Chat","display":"standalone","icons":[{"src":"data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTIwIDJINGMtMS4xIDAtMiAuOS0yIDJ2MThsNC00aDE0YzEuMSAwIDItLjkgMi0yVjRjMC0xLjEtLjktMi0yLTJ6Ii8+PC9zdmc+","sizes":"512x512","type":"image/svg+xml"}]}'
    />

    <title>HTML Chat</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        height: 100vh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        font-family: monospace, sans-serif;
        line-height: 1.6;
        padding: 2rem 1rem 1rem 1rem;
        color: #111;
        background: #fafafa;
        overflow: hidden;
      }

      header {
        flex-shrink: 0;
      }

      h1,
      h2,
      h3 {
        margin-top: 0;
      }

      button {
        cursor: pointer;
        font-family: inherit;
        background: #eee;
        border: 1px solid #000;
        padding: 5px 10px;
        color: #000;
      }

      button:hover {
        background: #ccc;
      }

      button:disabled {
        background: #e0e0e0;
        color: #888;
        border-color: #ccc;
        cursor: not-allowed;
      }

      input[type="text"],
      input[type="password"],
      input[type="number"],
      textarea,
      select {
        font-family: inherit;
        padding: 8px;
        border: 1px solid #000;
        box-sizing: border-box;
        width: 100%;
        margin-bottom: 10px;
        background: #fff;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      textarea:disabled {
        background: #e0e0e0;
        color: #555;
        border-color: #999;
        cursor: not-allowed;
      }

      .hidden {
        display: none !important;
      }

      .top-actions {
        position: fixed;
        top: 1rem;
        right: 1rem;
        display: flex;
        gap: 15px;
        z-index: 100;
      }

      .top-btn {
        color: #0055ff;
        text-decoration: underline;
        cursor: pointer;
        font-size: 0.9em;
      }

      .top-btn:hover {
        color: #ff0055;
      }

      .grid {
        display: flex;
        gap: 2rem;
        flex-grow: 1;
        min-height: 0;
        margin-top: 1rem;
      }

      @media (max-width: 768px) {
        .sidebar:not(.hidden)+.main {
          display: none;
        }

        .sidebar,
        .main {
          min-width: 0;
        }

        .sidebar {
          padding-right: 0;
        }
      }

      .sidebar {
        flex: 1;
        min-width: 250px;
        overflow-y: auto;
        padding-right: 10px;
      }

      .main {
        flex: 3;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      #chat-container {
        position: relative;
        flex-grow: 1;
        min-height: 0;
        overflow-y: auto;
        border: 2px solid #000;
        background: #ebebeb;
        padding: 15px;
        margin-bottom: 15px;
      }

      #input-area {
        flex-shrink: 0;
      }

      .msg {
        border-left: 4px solid #000;
        padding-left: 15px;
        margin-bottom: 20px;
        background: #fff;
        padding: 10px 10px 10px 15px;
        border-radius: 0 5px 5px 0;
        box-shadow: 2px 2px 0px #000;
      }

      .msg.editing {
        border-left-style: dashed;
        background: #f5f5f5;
      }

      .msg:last-child {
        margin-bottom: 0;
      }

      .msg.user {
        border-color: #0055ff;
      }

      .msg.assistant {
        border-color: #ff0055;
      }

      .msg.system {
        border-color: #ffaa00;
        background: #fff8e6;
      }

      .msg.error {
        border-color: #c00000;
        background: #ffeeee;
      }

      .msg.file {
        border-color: #00cc66;
        background: #eaffea;
      }

      .msg-meta {
        font-size: 0.85em;
        text-transform: uppercase;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
        display: flex;
        justify-content: space-between;
      }

      .msg-actions button {
        font-size: 0.8em;
        padding: 2px 6px;
        margin-left: 5px;
      }

      .msg-content {
        overflow-wrap: anywhere;
      }

      .msg-content p:first-child {
        margin-top: 0;
      }

      .msg-content p:last-child {
        margin-bottom: 0;
      }

      .msg-content pre {
        padding: 10px;
        border: 1px solid #000;
        overflow-x: auto;
        overflow-y: hidden;
        max-height: none !important;
        border-radius: 0;
      }

      .msg-content code {
        background: #eee;
        padding: 2px 4px;
        color: #000;
      }

      .msg-content pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .msg-content pre[class*="language-"] {
        background: #eee;
        margin: 0.5em 0;
        text-shadow: none;
      }

      .msg-content code[class*="language-"],
      .msg-content pre[class*="language-"] {
        font-family: inherit;
        font-size: 0.9em;
        line-height: 1.6;
        direction: ltr;
      }

      body.ctrl-down .msg-content pre[class*="language-"]:hover {
        background: #e0e0e0;
      }

      body.ctrl-down pre:hover code {
        background: transparent;
      }

      .chat-item {
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px;
        border: 1px solid transparent;
        margin-bottom: 5px;
      }

      .chat-item.active {
        border-color: #000;
        background: #eee;
        font-weight: bold;
      }

      .chat-item-title {
        cursor: pointer;
        flex-grow: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        margin-right: 10px;
      }

      .chat-item-actions {
        flex-shrink: 0;
        display: flex;
      }

      .chat-item-actions button {
        font-size: 0.7em;
        padding: 2px 5px;
        margin-left: 2px;
      }

      .file-progress-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        background: #0055ff;
        width: 0%;
        transition: width 0.3s ease;
      }

      .config-box {
        background: #eee;
        padding: 15px;
        border: 1px solid #000;
        margin-bottom: 20px;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        cursor: pointer;
      }

      body.ctrl-down pre,
      body.ctrl-down code,
      body.ctrl-down .katex,
      body.ctrl-down #settings-heading {
        cursor: pointer !important;
      }

      body.ctrl-down pre:hover,
      body.ctrl-down code:hover,
      body.ctrl-down .katex:hover,
      body.ctrl-down .chat-item:hover,
      body.ctrl-down #settings-heading:hover {
        background: #e0e0e0;
      }

      body.ctrl-down .chat-item-title {
        cursor: copy !important;
      }

      .katex {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
      }

      .role-select {
        appearance: none;
        width: auto;
        margin-bottom: 0;
        font-family: inherit;
        font-size: inherit;
        font-weight: inherit;
        text-transform: inherit;
        color: inherit;
        background: transparent;
        border: 1px solid transparent;
        cursor: pointer;
        padding: 0 4px;
        margin-left: -4px;
        outline: none;
      }

      .role-select:hover {
        background: #eee;
        border-color: #ccc;
      }

      .msg-actions {
        flex-shrink: 0;
      }

      .msg-content table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
        max-width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
      }

      .msg-content th,
      .msg-content td {
        border: 1px solid #ccc;
        padding: 6px 12px;
      }

      .msg-content th {
        background: #eee;
      }

      .active-setting {
        background: #ccc !important;
        border-color: #000 !important;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="top-actions">
      <a id="toggle-title-btn" class="top-btn" title="Alt+O" onclick="toggleTitle()">[show title]</a>
      <a id="toggle-sidebar-btn" class="top-btn" title="Alt+P" onclick="toggleSidebar()">[hide sidebar]</a>
    </div>

    <header id="header" class="hidden">
      <h1>HTML Chat</h1>
      <p>Browser-based chat for OpenAI-compatible APIs (no bullshit).</p>
    </header>

    <div class="grid">
      <aside class="sidebar" id="sidebar">
        <div class="config-box">
          <h3 id="settings-heading" title="Ctrl+Click for Super Secret Settings">Settings</h3>
          <label>Base URL</label>
          <input type="text" id="cfg-url" placeholder="https://api.openai.com/v1" />
          <label>API Key</label>
          <input type="password" id="cfg-key" placeholder="sk-..." />
          <label>Models (use commas)</label>
          <input type="text" id="cfg-models" placeholder="gpt-4o,gpt-3.5-turbo" />
          <label class="checkbox-label">
            <input type="checkbox" id="cfg-godmode" />
            <strong>Execute JavaScript</strong>
          </label>
          <button onclick="saveConfig()">Save</button>
          <button onclick="importChats()">Import</button>
          <button onclick="exportChats()">Export</button>
        </div>

        <div style="margin-bottom: 20px">
          <div style="display: flex; justify-content: space-between; align-items: center">
            <h3>Your Chats</h3>
            <button onclick="handleNewChatClick(event)" title="New: Alt+T ↔ Import: Alt+Click">+ New</button>
          </div>
          <div id="chat-list"></div>
        </div>

        <div>
          <div style="display: flex; justify-content: space-between; align-items: center">
            <h3>Your Files</h3>
            <button onclick="handleUploadClick()" title="Upload Files for Vector Search">+ Upload</button>
          </div>
          <div id="file-list"></div>
        </div>
      </aside>

      <main class="main">
        <div id="chat-container"></div>
        <div id="input-area">
          <div style="display: flex; gap: 10px; margin-bottom: 10px">
            <select id="model-select" style="width: auto; margin: 0" onchange="saveLastModel()"></select>
            <button
              id="send-btn"
              onclick="sendMessage()"
              title="Ctrl+Enter / Cmd+Enter"
              style="flex-grow: 1; font-weight: bold"
            >
              Send
            </button>
            <button
              id="save-edit-btn"
              class="hidden"
              onclick="saveGlobalEdit()"
              title="Ctrl+Enter / Cmd+Enter"
              style="flex-grow: 1; font-weight: bold"
            >
              Save
            </button>
            <button
              id="cancel-edit-btn"
              class="hidden"
              onclick="cancelGlobalEdit()"
              style="flex-grow: 1; font-weight: bold"
            >
              Cancel
            </button>
            <button
              id="secret-save-btn"
              class="hidden"
              onclick="saveSuperSecretSetting()"
              title="Ctrl+Enter / Cmd+Enter"
              style="flex-grow: 1; font-weight: bold"
            >
              Save
            </button>
            <button
              id="secret-reset-btn"
              class="hidden"
              onclick="resetSuperSecretSetting()"
              style="flex-grow: 1; font-weight: bold"
            >
              Reset
            </button>
            <button
              id="secret-cancel-btn"
              class="hidden"
              onclick="cancelSuperSecretSetting()"
              style="flex-grow: 1; font-weight: bold"
            >
              Cancel
            </button>
          </div>
          <textarea id="chat-input" placeholder="Type your prompt here..."></textarea>
        </div>
      </main>
    </div>

    <script>
      // --- PURE UTILITIES ---
      const $ = (s) => document.querySelector(s);

      const escapeHTML = (str) =>
        (str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      function pickFiles(multiple = true) {
        return new Promise((resolve) => {
          const input = document.createElement("input");
          input.type = "file";
          input.multiple = multiple;
          input.addEventListener("change", (e) =>
            resolve(Array.from(e.target.files)),
          );
          input.addEventListener("cancel", () => resolve([]));
          input.click();
        });
      }

      function readFileText(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = (e) => reject(e);
          reader.readAsText(file);
        });
      }

      function cosSim(a, b) {
        let dot = 0,
          magA = 0,
          magB = 0;
        for (let i = 0; i < a.length; i++) {
          dot += a[i] * b[i];
          magA += a[i] * a[i];
          magB += b[i] * b[i];
        }
        if (magA === 0 || magB === 0) return 0;
        return dot / (Math.sqrt(magA) * Math.sqrt(magB));
      }

      // --- CONSTANTS & DEFAULTS ---
      const DEFAULT_GOD_MODE_PROMPT = [
        "[SYSTEM OVERRIDE: CODE EXECUTION ENABLED]",
        "You are executing directly inside the user's web browser (JS console). You are NOT in a sandboxed cloud environment. You are NOT in Node.js or Python. You have full, unrestricted access to the user's 'window', 'document', 'navigator', 'localStorage', etc.",
        "",
        "However, to execute code, you MUST use this exact syntax (the return value is sent back to you):",
        "<run>",
        "// browser-side JS goes here",
        "return data.toString();",
        "</run>",
        "",
        "CRITICAL RULES FOR TOOL USE:",
        "1. DO NOT CALCULATE MANUALLY. If the user asks a math, logic, or data question, you MUST use a <run> block to compute it. Do not trust your own internal math.",
        '2. NO FAKE CODE, MOCKS, OR HARDCODING. Your JavaScript MUST contain actual logic, algorithms, math, or simulations. DO NOT write "simplified" checks or hardcode the answer you already suspect. If you need to search for a counterexample, write a GENUINE exhaustive search. The code itself must do the actual work to prove the answer.',
        "3. VANILLA JS LIMITATIONS. You are in a browser. You do not have Python's `itertools`, `numpy`, or `scipy`. If you need combinations, permutations, matrix operations, or deep equality checks, you MUST implement them yourself.",
        "4. STATE PERSISTENCE. Each <run> block executes in a fresh async function scope. Variables declared with `let` or `const` will NOT persist between runs. To save state across multiple runs, attach it to the global `window` object (e.g., `window.myState = ...`).",
        "5. ITERATIVE PROBLEM SOLVING. If a problem is too complex for one script, break it down. Write a <run> block to generate data, save it to `window`, and then write a second <run> block to process it. ",
        "6. DEFER YOUR ANSWER. If you output a <run> block, DO NOT attempt to answer the user's prompt in the same message. Output ONLY your thought process and the <run> block.",
        "7. WAIT FOR THE RESULT. The system will execute your code and return the result in the next message. If your code throws an error, DO NOT apologize—just write another <run> block to fix it and try again.",
        "8. DELIVER THE FINAL ANSWER ONLY AFTER EXECUTION. Unless an error is spotted, once you have the results write your final response to the user and DO NOT include any <run> tags.",
        "9. NEVER use Node.js modules (require, os, fs). They do not exist here.",
        "10. NEVER use markdown backticks (```) around the <run> tags. Just output the raw tags.",
        "",
        "EXAMPLE WORKFLOW:",
        "User: What is the square root of 9999?",
        "Assistant: I need to compute this using JavaScript.",
        "<run>",
        "return Math.sqrt(9999);",
        "</run>",
        "User: **Execution Result:**",
        "```text",
        "Return: 99.99499987499375",
        "```",
        "Assistant: The square root of 9999 is 99.994999875.",
      ].join("\n");

      const SETTING_DEFAULTS = {
        // --- LLM Category ---
        godModePrompt: {
          default: DEFAULT_GOD_MODE_PROMPT,
          tooltip: "System prompt used when God Mode is enabled.",
          category: "LLM Behavior",
        },
        temperature: {
          default: "",
          tooltip: "Controls randomness (0.0 to 2.0).",
          category: "LLM Behavior",
        },
        top_p: {
          default: "",
          tooltip: "Nucleus sampling (0.0 to 1.0).",
          category: "LLM Behavior",
        },
        max_tokens: {
          default: "",
          tooltip: "Maximum number of tokens to generate.",
          category: "LLM Behavior",
        },
        frequency_penalty: {
          default: "",
          tooltip: "Penalizes new tokens based on existing frequency (-2.0 to 2.0).",
          category: "LLM Behavior",
        },
        presence_penalty: {
          default: "",
          tooltip: "Penalizes new tokens based on presence (-2.0 to 2.0).",
          category: "LLM Behavior",
        },

        // --- Connection Category ---
        embeddingsUrl: {
          default: "",
          tooltip: "Custom base URL for embeddings (e.g. LiteLLM or OpenAI).",
          category: "API & Connections",
        },
        embeddingsKey: {
          default: "",
          tooltip: "API Key for the custom embeddings URL.",
          category: "API & Connections",
        },
        embeddingsModel: {
          default: "",
          tooltip: "Model used for processing local RAG commands. Empty to disable.",
          category: "API & Connections",
        },

        // --- RAG Category ---
        chunkSize: {
          default: "1000",
          tooltip: "Character size for file chunking.",
          category: "RAG & Document Processing",
        },
        chunkOverlap: {
          default: "200",
          tooltip: "Character overlap to maintain document continuity.",
          category: "RAG & Document Processing",
        },
        maxRagTokens: {
          default: "5000",
          tooltip: "Maximum estimated tokens to retrieve per file message.",
          category: "RAG & Document Processing",
        },
        ragThreshold: {
          default: "0.0",
          tooltip: "Min similarity threshold (0.0 to 1.0). 0.0 allows anything.",
          category: "RAG & Document Processing",
        },
        chunkBatchSize: {
          default: "100",
          tooltip: "Max chunks sent to Embeddings API at once.",
          category: "RAG & Document Processing",
        },
        chunkSeparator: {
          default: "...",
          tooltip: "String used to separate non-contiguous chunks (allows \\n).",
          category: "RAG & Document Processing",
        },
      };

      // --- INDEXEDDB WRAPPER ---
      const DB_NAME = "HTMLChatDB";
      const STORE_NAME = "keyval";

      function getDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result);
          request.onupgradeneeded = (e) => {
            e.target.result.createObjectStore(STORE_NAME);
          };
        });
      }

      async function dbGet(key) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readonly");
          const store = transaction.objectStore(STORE_NAME);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function dbSet(key, val) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          const store = transaction.objectStore(STORE_NAME);
          const request = store.put(val, key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      async function dbDelete(key) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          const store = transaction.objectStore(STORE_NAME);
          const request = store.delete(key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      // --- GLOBAL STATE ---
      let config = {};
      let chats = [];
      let files = [];
      let currentChatId = null;
      let currentAbortController = null;
      let isSidebarHidden = false;
      let isTitleHidden = false;
      let editingMessageIndex = null;
      let promptHeight = "";

      let isSuperSecretSettingsOpen = false;
      let activeSuperSecretSetting = null;
      let uncommittedSuperSecretValue = null;

      function saveState() {
        dbSet("mf_config", config);
        dbSet("mf_chats", chats);
        dbSet("mf_files", files);
        dbSet("mf_current_chat_id", currentChatId || "");
        dbSet("mf_sidebar_hidden", isSidebarHidden);
        dbSet("mf_title_hidden", isTitleHidden);
        dbSet("mf_prompt_height", promptHeight);
      }

      // --- CONFIGURATION & SUPER SECRET SETTINGS ---
      function saveConfig() {
        const oldRAG =
          config.embeddingsModel + config.chunkSize + config.chunkOverlap;

        config = {
          ...config,
          url: $("#cfg-url").value.trim(),
          key: $("#cfg-key").value.trim(),
          models: $("#cfg-models").value.trim(),
          godMode: $("#cfg-godmode").checked,
        };

        const newRAG =
          config.embeddingsModel + config.chunkSize + config.chunkOverlap;
        if (oldRAG !== newRAG) {
          resetAllFileEmbeddings();
        }

        saveState();
        updateModelDropdown();
        renderApp(true);
        updateTokenCount();
        alert("Settings saved, don't fuck them up.");
      }

      function selectSuperSecretSetting(key) {
        activeSuperSecretSetting = key;
        uncommittedSuperSecretValue = null;
        const area = $("#chat-input");
        area.value =
          config[key] !== undefined && config[key] !== ""
            ? config[key]
            : SETTING_DEFAULTS[key].default;
        renderApp(true);
        area.focus();
      }

      function saveSuperSecretSetting() {
        if (!activeSuperSecretSetting) return;
        let val = $("#chat-input").value;
        const key = activeSuperSecretSetting;
        const oldRAG =
          config.embeddingsModel + config.chunkSize + config.chunkOverlap;

        if (
          key === "godModePrompt" ||
          key === "embeddingsModel" ||
          key === "embeddingsUrl" ||
          key === "embeddingsKey" ||
          key === "chunkSeparator"
        ) {
          config[key] = val;
        } else {
          if (val.trim() === "") {
            config[key] = "";
          } else {
            const parsed = parseFloat(val);
            config[key] = isNaN(parsed) ? "" : parsed;
          }
        }

        const newRAG =
          config.embeddingsModel + config.chunkSize + config.chunkOverlap;
        if (oldRAG !== newRAG) {
          resetAllFileEmbeddings();
        }

        saveState();
        activeSuperSecretSetting = null;
        uncommittedSuperSecretValue = null;
        renderApp(true);
        updateTokenCount();
      }

      function resetSuperSecretSetting() {
        if (!activeSuperSecretSetting) return;
        const key = activeSuperSecretSetting;
        const oldRAG =
          config.embeddingsModel + config.chunkSize + config.chunkOverlap;
        config[key] = SETTING_DEFAULTS[key].default;

        const newRAG =
          config.embeddingsModel + config.chunkSize + config.chunkOverlap;
        if (oldRAG !== newRAG) resetAllFileEmbeddings();

        saveState();
        activeSuperSecretSetting = null;
        uncommittedSuperSecretValue = null;
        renderApp(true);
        updateTokenCount();

      function importChats() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const importedChats = JSON.parse(event.target.result);
              if (!Array.isArray(importedChats))
                throw new Error("Invalid format: expected an array of chats.");

              let addedCount = 0;
              const existingIds = new Set(chats.map((c) => c.id));

              for (const chat of importedChats) {
                if (!chat.id || !chat.messages) continue;
                if (!existingIds.has(chat.id)) {
                  chats.push(chat);
                  existingIds.add(chat.id);
                  addedCount++;
                }
              }

              chats.sort((a, b) => Number(b.id) - Number(a.id));
              if (!currentChatId && chats.length > 0) currentChatId = chats[0].id;

              saveState();
              renderApp();
              alert(`Successfully imported ${addedCount} new chat(s).`);
            } catch (err) {
              alert("Failed to import chats: " + err.message);
            }
          };
          reader.readAsText(file);
        };
        input.click();
      }

      // --- EMBEDDINGS & RAG ---
      async function fetchEmbeddings(texts) {
        let base =
          config.embeddingsUrl && config.embeddingsUrl.trim() !== ""
            ? config.embeddingsUrl.trim().replace(/\/+$/, "")
            : config.url.replace(/\/+$/, "");

        if (base.endsWith("/chat/completions"))
          base = base.replace("/chat/completions", "");
        const endpoint = base + "/embeddings";

        const apiKey =
          config.embeddingsKey && config.embeddingsKey.trim() !== ""
            ? config.embeddingsKey.trim()
            : config.key;

        const res = await fetch(endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: config.embeddingsModel || "text-embedding-3-small",
            input: texts,
          }),
        });

        if (!res.ok) {
          const errText = await res.text();
          let errMsg = errText;
          try {
            errMsg = JSON.parse(errText).error.message;
          } catch (e) {}
          throw new Error(`API Error: ${res.status} ${res.statusText}\n${errMsg}`);
        }
        const data = await res.json();
        return data.data.sort((a, b) => a.index - b.index).map((d) => d.embedding);
      }

      async function startEmbeddingLoop(id) {
        if (!config.embeddingsModel || config.embeddingsModel.trim() === "") return;

        const meta = files.find((f) => f.id === id);
        if (!meta || !meta.isEmbedding) return;
        const data = await dbGet(`mf_filedata_${id}`);
        if (!data) return;

        if (!data.chunks) {
          const chunkSize = parseInt(config.chunkSize) || 1000;
          const chunkOverlap = parseInt(config.chunkOverlap) || 200;
          const text = data.text;
          const chunks = [];
          let start = 0;
          let chunkIndex = 0;

          while (start < text.length) {
            let end = start + chunkSize;
            if (end > text.length) end = text.length;
            chunks.push({
              index: chunkIndex++,
              start: start,
              end: end,
              text: text.substring(start, end),
              vector: null,
            });
            if (end >= text.length) break;
            start = end - chunkOverlap;
          }

          data.chunks = chunks;
          meta.chunkCount = chunks.length;
          meta.embeddedCount = 0;
          await dbSet(`mf_filedata_${id}`, data);
        }

        const MAX_BATCH = parseInt(config.chunkBatchSize) || 100;

        while (true) {
          const currentMeta = files.find((f) => f.id === id);
          if (!currentMeta || !currentMeta.isEmbedding) break;

          const batch = data.chunks.filter((c) => !c.vector).slice(0, MAX_BATCH);
          if (batch.length === 0) {
            currentMeta.progress = 100;
            currentMeta.isEmbedding = false;
            break;
          }

          try {
            const batchTexts = batch.map((c) => c.text);
            const embs = await fetchEmbeddings(batchTexts);

            batch.forEach((c, i) => {
              c.vector = embs[i];
            });

            currentMeta.embeddedCount += batch.length;
            currentMeta.progress = Math.round(
              (currentMeta.embeddedCount / currentMeta.chunkCount) * 100,
            );

            await dbSet(`mf_filedata_${id}`, data);
            saveState();
            renderFileList();
            await new Promise((r) => setTimeout(r, 100)); // Yield to UI
          } catch (err) {
            console.error("Embedding error:", err);
            currentMeta.isEmbedding = false;
            saveState();
            renderFileList();
            alert(`Embedding failed for ${currentMeta.name}: ${err.message}`);
            break;
          }
        }

        saveState();
        renderFileList();
      }

      async function resolveAllMessages(messages, btnEl) {
        let resolved = [];

        for (let i = 0; i < messages.length; i++) {
          const msg = messages[i];

          if (msg.role === "file") {
            const meta = files.find((f) => f.id === msg.fileId);
            const mode = msg.mode || "embed";

            if (mode === "full") {
              let fileContent = msg.content;
              if (!fileContent && meta) {
                const data = await dbGet(`mf_filedata_${meta.id}`);
                if (data) {
                  const extMatch = (meta.name || "").match(/\.([^.]+)$/);
                  const ext = extMatch ? extMatch[1] : "txt";
                  const blockTicks = data.text.includes("```") ? "````" : "```";
                  fileContent = `\`${meta.name}\`:\n\n${blockTicks}${ext}\n${data.text}\n${blockTicks}`;
                }
              }
              resolved.push({
                role: "user",
                content: fileContent || "*File not found.*",
              });
            } else {
              let fileContent = "*File not found.*";

              if (meta) {
                const data = await dbGet(`mf_filedata_${meta.id}`);
                if (data) {
                  let actualPrompt = msg.prompt ? msg.prompt.trim() : "";
                  let implicitSearchUsed = false;

                  if (!actualPrompt) {
                    let lookaheadText = [];
                    for (let j = i + 1; j < messages.length; j++) {
                      const nextMsg = messages[j];
                      if (nextMsg.role === "assistant") break;
                      if (nextMsg.role === "user" && nextMsg.content) {
                        lookaheadText.push(nextMsg.content);
                      }
                    }
                    actualPrompt = lookaheadText.join("\n").trim();
                    if (actualPrompt) implicitSearchUsed = true;
                  }

                  if (data.chunks) {
                    const validChunks = data.chunks.filter((c) => c.vector);
                    if (validChunks.length > 0) {
                      let queryEmb = null;

                      if (actualPrompt) {
                        if (btnEl)
                          btnEl.textContent = `Embedding prompt for ${meta.name}...`;
                        queryEmb = (await fetchEmbeddings([actualPrompt]))[0];
                      }

                      validChunks.forEach((c) => {
                        c.score = queryEmb ? cosSim(queryEmb, c.vector) : -c.index;
                      });

                      const threshold = msg.ragThreshold || 0.0;
                      let topChunks = validChunks.filter(
                        (c) => !queryEmb || c.score >= threshold,
                      );
                      topChunks.sort((a, b) => b.score - a.score);

                      const maxTokens = msg.maxTokens || 5000;
                      let currentTokens = 0;
                      let selectedChunks = [];

                      for (const c of topChunks) {
                        const chunkTokens = Math.ceil(c.text.length / 4);
                        if (
                          selectedChunks.length > 0 &&
                          currentTokens + chunkTokens > maxTokens
                        )
                          break;
                        selectedChunks.push(c);
                        currentTokens += chunkTokens;
                      }

                      selectedChunks.sort((a, b) => a.index - b.index);

                      let mergedContent = "";
                      let sep =
                        msg.chunkSeparator !== undefined ? msg.chunkSeparator : "...";
                      sep = sep.replace(/\\n/g, "\n").replace(/\\t/g, "\t");

                      for (let j = 0; j < selectedChunks.length; j++) {
                        const curr = selectedChunks[j];
                        if (j === 0) {
                          mergedContent += curr.text;
                        } else {
                          const prev = selectedChunks[j - 1];
                          if (curr.index === prev.index + 1) {
                            mergedContent += data.text.substring(prev.end, curr.end);
                          } else {
                            mergedContent += sep + curr.text;
                          }
                        }
                      }
                      fileContent = mergedContent;
                    } else {
                      fileContent = "*File unindexed or no valid chunks.*";
                    }
                  } else {
                    fileContent = "*File unindexed.*";
                  }
                }
              }

              const extMatch = (msg.fileName || "").match(/\.([^.]+)$/);
              const ext = extMatch ? extMatch[1] : "txt";
              const blockTicks = fileContent.includes("```") ? "````" : "```";
              const formatted = `\`${msg.fileName}\`:\n\n${blockTicks}${ext}\n${fileContent}\n${blockTicks}`;

              resolved.push({
                role: "user",
                content: formatted,
              });
            }
          } else {
            resolved.push(msg);
          }
        }

        return resolved;
      }

      // --- LLM API & GOD MODE ---
      async function executeGodMode(code) {
        let logs = [];
        const safeStr = (obj) => {
          try {
            return typeof obj === "object"
              ? JSON.stringify(obj, null, 2)
              : String(obj);
          } catch {
            return Object.prototype.toString.call(obj);
          }
        };
        const proxyConsole = {
          log: (...args) => logs.push(args.map(safeStr).join(" ")),
          error: (...args) => logs.push("ERROR: " + args.map(safeStr).join(" ")),
        };
        let result,
          errorStr = "";
        try {
          const execFn = new (Object.getPrototypeOf(
            async function () {},
          ).constructor)("console", code);
          result = await execFn(proxyConsole);
        } catch (err) {
          errorStr = err.toString();
        }

        let out = "**Execution Result:**\n```text\n";
        if (logs.length) out += logs.join("\n") + "\n";
        if (result !== undefined) out += "Return: " + safeStr(result) + "\n";
        if (errorStr) out += "Error: " + errorStr + "\n";
        if (!logs.length && result === undefined && !errorStr)
          out += "Code executed successfully with no output.\n";
        return out + "```";
      }

      async function sendMessage(autoLoopDepth = 0, skipApi = false) {
        const btn = $("#send-btn");
        const MAX_LOOPS = 5;

        if (autoLoopDepth >= MAX_LOOPS) {
          chats
            .find((c) => c.id === currentChatId)
            .messages.push({
              role: "error",
              content: `**System Error:** Maximum execution loop depth (${MAX_LOOPS}) reached.`,
            });
          updateTokenCount();
          saveState();
          renderApp();
          return;
        }

        const isAutoLoop = autoLoopDepth > 0;
        if (currentAbortController && !isAutoLoop) {
          currentAbortController.abort();
          currentAbortController = null;
          btn.textContent = "Send";
          return;
        }

        const inputEl = $("#chat-input");
        let text = inputEl.value.trim();

        if (!isAutoLoop) {
          if (!text) return;
          if (!config.key && !skipApi)
            return alert("Please enter your API key in the settings first.");

          if (!currentChatId) newChat();

          const chat = chats.find((c) => c.id === currentChatId);

          if (!chat.messages.length) {
            const lastDoubleNewline = text.lastIndexOf("\n\n");
            const titleSource =
              lastDoubleNewline !== -1
                ? text.substring(lastDoubleNewline + 2).trim()
                : text;
            chat.title =
              titleSource.substring(0, 30) + (titleSource.length > 30 ? "..." : "");
          }

          chat.messages.push({ role: "user", content: text });
          inputEl.value = "";
          saveState();
          renderApp();
        }

        if (skipApi) return;

        currentAbortController = new AbortController();
        btn.textContent = isAutoLoop
          ? `Thinking (Loop ${autoLoopDepth}/${MAX_LOOPS})...`
          : "Thinking...";

        try {
          const chat = chats.find((c) => c.id === currentChatId);
          let cleanMessages = chat.messages
            .filter((m) => m.role !== "error")
            .map((m) => {
              if (m.role === "file") return { ...m };
              return { role: m.role, content: m.content || "" };
            });

          if (config.godMode) {
            cleanMessages.unshift({
              role: "system",
              content: config.godModePrompt || DEFAULT_GOD_MODE_PROMPT,
            });
          }

          cleanMessages = await resolveAllMessages(cleanMessages, btn);

          const payload = {
            model: $("#model-select").value,
            messages: cleanMessages,
          };

          if (config.temperature !== "" && config.temperature !== undefined)
            payload.temperature = parseFloat(config.temperature);
          if (config.top_p !== "" && config.top_p !== undefined)
            payload.top_p = parseFloat(config.top_p);
          if (
            config.frequency_penalty !== "" &&
            config.frequency_penalty !== undefined
          )
            payload.frequency_penalty = parseFloat(config.frequency_penalty);
          if (config.presence_penalty !== "" && config.presence_penalty !== undefined)
            payload.presence_penalty = parseFloat(config.presence_penalty);
          if (config.max_tokens !== "" && config.max_tokens !== undefined)
            payload.max_tokens = parseInt(config.max_tokens, 10);

          const response = await fetch(`${config.url}/chat/completions`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${config.key}`,
            },
            body: JSON.stringify(payload),
            signal: currentAbortController.signal,
          });

          if (!response.ok)
            throw new Error(
              (await response.json().catch(() => ({}))).error?.message ||
                `HTTP ${response.status}`,
            );
          const reply = (await response.json()).choices[0].message.content || "";

          if (config.godMode && reply) {
            const runMatches = [...reply.matchAll(/<run>([\s\S]*?)<\/run>/g)];
            if (runMatches.length > 0) {
              chat.messages.push({ role: "assistant", content: reply });
              saveState();
              renderApp();

              for (const match of runMatches) {
                const code = match[1].trim();
                const result = await executeGodMode(code);
                chat.messages.push({ role: "user", content: result });
                saveState();
                renderApp(true);
              }
              return sendMessage(autoLoopDepth + 1);
            }
          }

          if (reply.trim() !== "" || isAutoLoop) {
            chat.messages.push({ role: "assistant", content: reply });
            saveState();
            renderApp();
          }
        } catch (error) {
          const chat = chats.find((c) => c.id === currentChatId);
          chat.messages.push({
            role: "error",
            content:
              error.name === "AbortError"
                ? "**System:** Request cancelled by user."
                : `**Error:**\n\n${error.message}`,
          });
        }

        currentAbortController = null;
        btn.textContent = "Send";
        saveState();
        renderApp();
      }

      // --- UI TOGGLES & UPDATES ---
      function updateModelDropdown() {
        const select = $("#model-select");
        const models = config.models
          .split(",")
          .map((m) => m.trim())
          .filter(Boolean);
        select.innerHTML = models
          .map((m) => `<option value="${m}">${m}</option>`)
          .join("");
        if (config.lastModel && models.includes(config.lastModel))
          select.value = config.lastModel;
        else if (models.length > 0) {
          config.lastModel = models[0];
          saveState();
        }
      }

      function saveLastModel() {
        config.lastModel = $("#model-select").value;
        saveState();
      }

      function toggleSidebar() {
        isSidebarHidden = !isSidebarHidden;
        saveState();
        applySidebarState();
      }

      function applySidebarState() {
        $("#sidebar").classList.toggle("hidden", isSidebarHidden);
        $("#toggle-sidebar-btn").textContent = isSidebarHidden
          ? "[show sidebar]"
          : "[hide sidebar]";
      }

      function toggleTitle() {
        isTitleHidden = !isTitleHidden;
        saveState();
        applyTitleState();
      }

      function applyTitleState() {
        $("#header").classList.toggle("hidden", isTitleHidden);
        $("#toggle-title-btn").textContent = isTitleHidden
          ? "[show title]"
          : "[hide title]";
      }

      function updateTokenCount() {
        const btn = $("#send-btn");
        if (!btn) return;

        if (btn.textContent.includes("Thinking") || btn.classList.contains("hidden"))
          return;

        const inputVal = $("#chat-input").value || "";
        let contextChars = 0;

        if (currentChatId) {
          const chat = chats.find((c) => c.id === currentChatId);
          if (chat && chat.messages) {
            contextChars = chat.messages.reduce((acc, m) => {
              if (m.role === "file") {
                if (m.mode === "full") return acc + (m.content || "").length;
                return acc + (m.maxTokens || 5000) * 4;
              }
              return acc + (m.content || "").length;
            }, 0);
          }
        }

        if (config.godMode) {
          contextChars += (config.godModePrompt || DEFAULT_GOD_MODE_PROMPT).length;
        }

        const totalChars = inputVal.length + contextChars;
        const tokens = Math.ceil(totalChars / 4);

        if (tokens < 1000) {
          btn.textContent = "Send";
        } else {
          let label;
          if (tokens >= 1000000) {
            label = (tokens / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
          } else {
            label = (tokens / 1000).toFixed(1).replace(/\.0$/, "") + "k";
          }
          btn.textContent = `Send (${label} tokens)`;
        }
      }

      // --- RENDERING LOGIC ---
      marked.use({
        extensions: [
          {
            name: "math",
            level: "inline",
            start(src) {
              return src.match(/\$/)?.index;
            },
            tokenizer(src) {
              const blockMatch = /^\$\$([\s\S]+?)\$\$/.exec(src);
              if (blockMatch)
                return { type: "math", raw: blockMatch[0], text: blockMatch[1] };
              const inlineMatch = /^\$([^\s$](?:\\.|[^$\n])*?)\$/.exec(src);
              if (inlineMatch)
                return { type: "math", raw: inlineMatch[0], text: inlineMatch[1] };
            },
            renderer(token) {
              return escapeHTML(token.raw);
            },
          },
        ],
      });

      function renderApp(preserveScroll = false) {
        renderFileList();
        renderChatList();
        renderCurrentChat(preserveScroll);
        applyInputAreaState();
      }

      function applyInputAreaState() {
        const area = $("#chat-input");
        if (!area) return;
        const modelSel = $("#model-select");
        const sendBtn = $("#send-btn");
        const saveBtn = $("#save-edit-btn");
        const cancelBtn = $("#cancel-edit-btn");
        const secSaveBtn = $("#secret-save-btn");
        const secResetBtn = $("#secret-reset-btn");
        const secCancelBtn = $("#secret-cancel-btn");

        modelSel.classList.add("hidden");
        sendBtn.classList.add("hidden");
        saveBtn.classList.add("hidden");
        cancelBtn.classList.add("hidden");
        secSaveBtn.classList.add("hidden");
        secResetBtn.classList.add("hidden");
        secCancelBtn.classList.add("hidden");

        area.style.height = promptHeight;

        if (isSuperSecretSettingsOpen) {
          secSaveBtn.classList.remove("hidden");
          secResetBtn.classList.remove("hidden");
          secCancelBtn.classList.remove("hidden");

          if (!activeSuperSecretSetting) {
            area.disabled = true;
            if (area.value !== "") area.value = "";
            area.placeholder = "Select a setting above to edit...";
            secSaveBtn.disabled = true;
            secResetBtn.disabled = true;
            secCancelBtn.disabled = true;
          } else {
            area.disabled = false;
            secSaveBtn.disabled = false;
            secResetBtn.disabled = false;
            secCancelBtn.disabled = false;
            area.placeholder = SETTING_DEFAULTS[activeSuperSecretSetting].tooltip;
          }
        } else if (editingMessageIndex !== null) {
          saveBtn.classList.remove("hidden");
          cancelBtn.classList.remove("hidden");
          area.disabled = false;

          const chat = chats.find((c) => c.id === currentChatId);
          const isFile = chat && chat.messages[editingMessageIndex]?.role === "file";
          const isEmbed =
            isFile && chat.messages[editingMessageIndex]?.mode === "embed";

          area.placeholder = isEmbed
            ? "Default behavior: Uses subsequent user messages for search."
            : "";
        } else {
          modelSel.classList.remove("hidden");
          sendBtn.classList.remove("hidden");
          area.disabled = false;
          area.placeholder = "Type your prompt here...";
        }
      }

      function renderFileList() {
        const list = $("#file-list");
        if (!files.length)
          return (list.innerHTML =
            '<p style="font-size:0.8em; color:#666;">No files uploaded.</p>');

        const embeddingsEnabled = !!(
          config.embeddingsModel && config.embeddingsModel.trim() !== ""
        );

        list.innerHTML = files
          .map((f) => {
            let embedBtn = "";
            let progressBar = "";

            if (embeddingsEnabled) {
              progressBar = `<div class="file-progress-bar" style="width: ${f.progress}%"></div>`;
              if (f.progress < 100) {
                embedBtn = `<button data-action="embed" title="${f.isEmbedding ? "Pause Embedding" : "Start Embedding"}">${f.isEmbedding ? "⏸" : "e"}</button>`;
              } else {
                embedBtn = `<button data-action="embed" title="Insert Embedding">e</button>`;
              }
            }

            return `
          <div class="chat-item" data-id="${f.id}" data-type="file">
            <div class="chat-item-title" data-action="load" title="Click to insert full contents into chat\nAlt+Click to overwrite contents">${escapeHTML(f.name)}</div>
            <div class="chat-item-actions">
              ${embedBtn}
              <button data-action="delete" title="Delete File">d</button>
            </div>
            ${progressBar}
          </div>
        `;
          })
          .join("");
      }

      function renderChatList() {
        const list = $("#chat-list");
        if (!chats.length)
          return (list.innerHTML =
            '<p style="font-size:0.8em; color:#666;">No chats. Start a new one.</p>');

        list.innerHTML = chats
          .map(
            (chat) => `
          <div class="chat-item ${chat.id === currentChatId ? "active" : ""}" data-id="${chat.id}" data-type="chat">
            <div class="chat-item-title" data-action="load" title="Export: Alt+Click">${escapeHTML(chat.title)}</div>
            <div class="chat-item-actions">
              <button data-action="rename" title="Rename">r</button>
              <button data-action="delete" title="Delete">d</button>
            </div>
          </div>
        `,
          )
          .join("");
      }

      function renderCurrentChat(preserveScroll = false) {
        const container = $("#chat-container");
        const prevScroll = container.scrollTop;

        if (isSuperSecretSettingsOpen) {
          const getSettingDisplay = (k) => {
            const val = config[k];
            const isDefault =
              val === undefined || val === "" || val === SETTING_DEFAULTS[k].default;

            if (k === "godModePrompt") return isDefault ? "Default" : "Custom";
            if (k === "embeddingsKey") return val ? "Custom" : "API Default";
            if (k === "embeddingsModel")
              return val === "" || val === undefined ? "Disabled" : escapeHTML(val);

            let displayVal = val === "" || val === undefined ? "API Default" : val;
            return escapeHTML(String(displayVal));
          };

          const settingNames = {
            godModePrompt: "God Mode Prompt",
            temperature: "Temperature",
            top_p: "Top P",
            max_tokens: "Max Tokens",
            frequency_penalty: "Frequency Penalty",
            presence_penalty: "Presence Penalty",
            embeddingsUrl: "Embeddings Base URL",
            embeddingsKey: "Embeddings API Key",
            embeddingsModel: "Embeddings Model",
            chunkSize: "Chunk Size",
            chunkOverlap: "Chunk Overlap",
            maxRagTokens: "Max RAG Tokens",
            ragThreshold: "RAG Match Threshold",
            chunkBatchSize: "Chunk Batch Size",
            chunkSeparator: "Chunk Separator",
          };

          const categories = {};
          Object.keys(SETTING_DEFAULTS).forEach((key) => {
            const cat = SETTING_DEFAULTS[key].category || "Other";
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(key);
          });

          let sectionsHTML = "";
          for (const [catName, keys] of Object.entries(categories)) {
            sectionsHTML += `
              <div style="margin-top: 20px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">
                <h3 style="margin: 0; font-size: 0.9em; text-transform: uppercase; color: #666;">${catName}</h3>
              </div>
              <div style="padding: 10px 0;">`;

            sectionsHTML += keys
              .map((k) => {
                const isActive = activeSuperSecretSetting === k;
                const tooltip = SETTING_DEFAULTS[k].tooltip;
                return `<button 
                class="${isActive ? "active-setting" : ""}" 
                onclick="selectSuperSecretSetting('${k}')" 
                title="${escapeHTML(tooltip)}"
                style="width:100%; margin-bottom:5px; text-align:left; font-family: monospace; display: flex; justify-content: space-between;">
                  <span>Edit ${settingNames[k]}</span>
                  <span style="opacity: 0.7;">${getSettingDisplay(k)}</span>
              </button>`;
              })
              .join("");

            sectionsHTML += `</div>`;
          }

          container.innerHTML = `
            <div>
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">Super Secret Settings</h2>
                <button onclick="resetAllSuperSecretSettings()">Reset All</button>
              </div>
              <p style="margin-top: 5px; font-size: 0.85em; color: #555;">
                Advanced engine parameters. Hover over a setting to see its description.
              </p>
              ${sectionsHTML}
            </div>
          `;
          return;
        }

        if (!currentChatId)
          return (container.innerHTML =
            '<h3 style="margin:0;">No chat selected.</h3>');
        const chat = chats.find((c) => c.id === currentChatId);

        let html = "";

        if (config.godMode) {
          html += `
            <div class="msg system">
              <div class="msg-meta">
                <span>System</span>
                <div class="msg-actions"><span style="font-size: 0.8em; color: #888;">[Read-Only]</span></div>
              </div>
              <div class="msg-content">${marked.parse("**JS Execution Enabled**. Proceed with caution.")}</div>
            </div>
          `;
        }

        if (!chat.messages.length && !config.godMode) {
          html +=
            '<p style="margin:0; padding-top: 15px;">It is empty in here. Send a prompt.</p>';
        } else {
          html += chat.messages
            .map((msg, i) => {
              let isEditing = editingMessageIndex === i;
              let displayContent = msg.content || "";
              let configHtml = "";

              if (msg.role === "assistant") {
                displayContent = displayContent.replace(
                  /<run>([\s\S]*?)<\/run>/g,
                  (match, code) =>
                    `**Executing Code:**\n\`\`\`javascript\n${code.trim()}\n\`\`\``,
                );
              } else if (msg.role === "file") {
                if (msg.mode === "embed") {
                  displayContent = `*Estimated file size: ~${msg.approxTokens || 0} tokens*<br>*(<= ${msg.maxTokens || 5000} tokens with embeddings enabled)*`;
                  if (msg.prompt)
                    displayContent += `\n\n**Search Prompt:** ${msg.prompt}`;

                  if (isEditing) {
                    configHtml = `
      <div style="display:flex; gap:15px; flex-wrap:wrap; margin-top:10px; align-items:center; background: #eee; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <label style="display:flex; flex-direction:column; font-size:0.85em; font-weight:bold;">Max Tokens <input type="number" class="embed-cfg-tokens" value="${msg.maxTokens || 5000}" style="width:100px; margin:4px 0 0 0; padding:4px; font-weight:normal;"></label>
        <label style="display:flex; flex-direction:column; font-size:0.85em; font-weight:bold;">Match Threshold <input type="number" step="0.1" class="embed-cfg-threshold" value="${msg.ragThreshold || 0.0}" style="width:100px; margin:4px 0 0 0; padding:4px; font-weight:normal;"></label>
        <label style="display:flex; flex-direction:column; font-size:0.85em; font-weight:bold;">Chunk Separator <input type="text" class="embed-cfg-separator" value="${escapeHTML(msg.chunkSeparator !== undefined ? msg.chunkSeparator : "...")}" style="width:120px; margin:4px 0 0 0; padding:4px; font-weight:normal;"></label>
      </div>`;
                  }
                } else {
                  displayContent = `*Estimated file size: ~${msg.approxTokens || 0} tokens*`;
                }
              }

              let actionsHtml = "";
              if (isEditing) {
                actionsHtml = `
                  <button data-action="save-edit">Save</button>
                  <button data-action="cancel-edit">Cancel</button>
                  <button data-action="toggle-wrap">Toggle Wrap</button>
                `;
              } else {
                let editBtn = `<button data-action="edit">Edit</button>`;
                if (msg.role === "file" && msg.mode === "embed") {
                  editBtn = `<button data-action="edit">Config</button>`;
                }
                actionsHtml = `
                  ${editBtn}
                  <button data-action="fork">Fork</button>
                  ${msg.role === "user" || msg.role === "file" ? `<button data-action="retry">Retry</button>` : ""}
                  <button data-action="delete">Delete</button>
                `;
              }

              return `
            <div class="msg ${msg.role} ${isEditing ? "editing" : ""}" data-index="${i}">
              <div class="msg-meta">
                ${
                  msg.role === "file"
                    ? `<span>FILE: ${escapeHTML(msg.fileName)}</span>`
                    : `<select class="role-select">
                    <option value="user" ${msg.role === "user" ? "selected" : ""}>user</option>
                    <option value="assistant" ${msg.role === "assistant" ? "selected" : ""}>assistant</option>
                    <option value="system" ${msg.role === "system" ? "selected" : ""}>system</option>
                    ${msg.role === "error" ? `<option value="error" selected>error</option>` : ""}
                  </select>`
                }
                <div class="msg-actions">${actionsHtml}</div>
              </div>
              <div class="msg-content">${marked.parse(displayContent)}${configHtml}</div>
            </div>
          `;
            })
            .join("");
        }

        container.innerHTML = html;

        renderMathInElement(container, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
          ],
          output: "htmlAndMathml",
          throwOnError: false,
        });
        Prism.highlightAllUnder(container);

        if (preserveScroll) container.scrollTop = prevScroll;
        else {
          const lastMsg = container.lastElementChild;
          if (lastMsg && lastMsg.classList.contains("msg")) {
            container.scrollTop =
              lastMsg.classList.contains("user") || lastMsg.classList.contains("file")
                ? container.scrollHeight
                : lastMsg.offsetTop - 15;
          }
        }

        updateTokenCount();
      }

      // --- DOM EVENT DELEGATION ---
      $("#settings-heading").addEventListener("click", (e) => {
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault();
          isSuperSecretSettingsOpen = !isSuperSecretSettingsOpen;
          if (!isSuperSecretSettingsOpen) {
            activeSuperSecretSetting = null;
            uncommittedSuperSecretValue = null;
            $("#chat-input").value = "";
          } else {
            if (activeSuperSecretSetting) {
              const area = $("#chat-input");
              if (uncommittedSuperSecretValue !== null) {
                area.value = uncommittedSuperSecretValue;
              } else {
                area.value =
                  config[activeSuperSecretSetting] !== "" &&
                  config[activeSuperSecretSetting] !== undefined
                    ? config[activeSuperSecretSetting]
                    : SETTING_DEFAULTS[activeSuperSecretSetting].default;
              }
            }
          }
          renderApp();
        }
      });

      $("#sidebar").addEventListener("click", (e) => {
        const item = e.target.closest(".chat-item");
        if (!item) return;
        const id = item.dataset.id;
        const type = item.dataset.type || "chat";
        const action = e.target.dataset.action;

        if (type === "chat") {
          if (action === "rename") renameChat(id);
          else if (action === "delete") deleteChat(id);
          else if (action === "load") {
            if (e.altKey) {
              e.preventDefault();
              exportSingleChat(id);
            } else if (e.ctrlKey || e.metaKey) {
              const chat = chats.find((c) => c.id === id);
              const text =
                `# ${chat.title}\n\n` +
                chat.messages
                  .map(
                    (m) =>
                      `## ${m.role.toUpperCase()}\n${m.content || m.prompt || ""}\n\n`,
                  )
                  .join("");
              navigator.clipboard.writeText(text.trim()).then(() => {
                item.style.background = "#ccc";
                setTimeout(() => (item.style.background = ""), 150);
              });
            } else loadChat(id);
          }
        } else if (type === "file") {
          if (action === "delete") deleteFile(id);
          else if (action === "embed") {
            const meta = files.find((f) => f.id === id);
            if (meta && meta.progress >= 100) {
              appendFileMessage(id, "embed");
            } else {
              toggleEmbedding(id);
            }
          } else if (action === "load") {
            if (e.altKey) {
              e.preventDefault();
              reuploadFile(id);
            } else {
              appendFileMessage(id, "full");
            }
          }
        }
      });

      $("#chat-container").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;
        const msgDiv = btn.closest(".msg");
        if (!msgDiv || !msgDiv.hasAttribute("data-index")) return;
        const index = parseInt(msgDiv.dataset.index, 10);
        if (isNaN(index)) return;

        const action = btn.dataset.action;

        if (action === "edit") startGlobalEdit(index);
        else if (action === "save-edit") saveGlobalEdit();
        else if (action === "cancel-edit") cancelGlobalEdit();
        else if (action === "toggle-wrap") toggleGlobalWrap();
        else if (action === "fork") forkChat(index);
        else if (action === "retry") retryMessage(index);
        else if (action === "delete") deleteMessage(index);
      });

      $("#chat-container").addEventListener("change", (e) => {
        if (e.target.classList.contains("role-select")) {
          const msgDiv = e.target.closest(".msg");
          if (!msgDiv || !msgDiv.hasAttribute("data-index")) return;
          const index = parseInt(msgDiv.dataset.index, 10);
          if (isNaN(index)) return;

          const chat = chats.find((c) => c.id === currentChatId);

          chat.messages[index].role = e.target.value;
          saveState();
          renderApp(true);
        }
      });

      // --- KEYBOARD & CLIPBOARD LISTENERS ---
      $("#chat-input").addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          if (isSuperSecretSettingsOpen && activeSuperSecretSetting) {
            saveSuperSecretSetting();
          } else if (editingMessageIndex !== null) {
            saveGlobalEdit();
          } else {
            sendMessage(0, e.shiftKey);
          }
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.altKey && e.key.toLowerCase() === "t") {
          e.preventDefault();
          newChat();
          $("#chat-input").focus();
        }
        if (e.altKey && e.key.toLowerCase() === "w") {
          e.preventDefault();
          if (currentChatId) deleteChat(currentChatId);
        }
        if (e.altKey && e.key.toLowerCase() === "r") {
          e.preventDefault();
          if (currentChatId) renameChat(currentChatId);
        }
        if (e.altKey && e.key.toLowerCase() === "p") {
          e.preventDefault();
          toggleSidebar();
        }
        if (e.altKey && e.key.toLowerCase() === "o") {
          e.preventDefault();
          toggleTitle();
        }

        if (e.shiftKey && (e.key === "ArrowUp" || e.key === "ArrowDown")) {
          if (document.activeElement?.tagName === "TEXTAREA") return;
          e.preventDefault();
          const container = $("#chat-container");
          const msgs = Array.from(container.querySelectorAll(".msg"));
          if (!msgs.length) return;

          if (e.key === "ArrowDown") {
            const next = msgs.find((m) => m.offsetTop - 15 > container.scrollTop + 5);
            container.scrollTop = next ? next.offsetTop - 15 : container.scrollHeight;
          } else {
            const prev = msgs
              .slice()
              .reverse()
              .find((m) => m.offsetTop - 15 < container.scrollTop - 5);
            container.scrollTop = prev ? prev.offsetTop - 15 : 0;
          }
        }

        if (e.altKey && (e.key === "ArrowUp" || e.key === "ArrowDown")) {
          e.preventDefault();
          if (!chats.length) return;
          let idx = Math.max(
            0,
            chats.findIndex((c) => c.id === currentChatId),
          );
          if (e.key === "ArrowUp" && idx > 0) loadChat(chats[idx - 1].id);
          if (e.key === "ArrowDown" && idx < chats.length - 1)
            loadChat(chats[idx + 1].id);
        }

        if (
          !e.shiftKey &&
          !e.altKey &&
          !e.ctrlKey &&
          !e.metaKey &&
          (e.key === "ArrowUp" || e.key === "ArrowDown")
        ) {
          const tag = document.activeElement?.tagName.toLowerCase();
          if (tag !== "input" && tag !== "textarea" && tag !== "select") {
            e.preventDefault();
            $("#chat-container").scrollBy({
              top: e.key === "ArrowDown" ? 150 : -150,
              behavior: "smooth",
            });
          }
        }
      });

      const toggleModifierMode = (e) => {
        if (e.key === "Control" || e.key === "Meta")
          document.body.classList.toggle("ctrl-down", e.type === "keydown");
        if (e.key === "Alt")
          document.body.classList.toggle("alt-down", e.type === "keydown");
      };
      window.addEventListener("keydown", toggleModifierMode);
      window.addEventListener("keyup", toggleModifierMode);
      window.addEventListener("blur", () => {
        document.body.classList.remove("ctrl-down");
        document.body.classList.remove("alt-down");
      });

      $("#chat-container").addEventListener("click", (e) => {
        if (!(e.ctrlKey || e.metaKey)) return;
        const target =
          e.target.closest(".katex") ||
          e.target.closest("pre") ||
          e.target.closest("code");
        if (!target) return;

        let text = target.classList.contains("katex")
          ? target.querySelector("annotation")?.textContent ||
            target.querySelector(".katex-mathml math")?.getAttribute("alttext") ||
            ""
          : target.innerText;

        if (text) {
          e.preventDefault();
          navigator.clipboard.writeText(text).then(() => {
            const bg = target.style.backgroundColor;
            target.style.backgroundColor = "#ccc";
            setTimeout(() => (target.style.backgroundColor = bg), 100);
          });
        }
      });

      // --- INITIALIZATION ---
      async function init() {
        config = (await dbGet("mf_config")) || {
          url: "https://api.openai.com/v1",
          key: "",
          models: "gpt-4o, gpt-4-turbo, gpt-3.5-turbo",
          godMode: false,
          lastModel: "",
        };

        for (const key in SETTING_DEFAULTS) {
          if (config[key] === undefined) {
            config[key] = SETTING_DEFAULTS[key].default;
          }
        }

        chats = (await dbGet("mf_chats")) || [];
        files = (await dbGet("mf_files")) || [];
        currentChatId = (await dbGet("mf_current_chat_id")) || null;
        isSidebarHidden = (await dbGet("mf_sidebar_hidden")) === true;
        isTitleHidden = (await dbGet("mf_title_hidden")) === true;
        promptHeight = (await dbGet("mf_prompt_height")) || "";

        $("#cfg-url").value = config.url;
        $("#cfg-key").value = config.key;
        $("#cfg-models").value = config.models;
        $("#cfg-godmode").checked = config.godMode || false;

        updateModelDropdown();
        applySidebarState();
        applyTitleState();

        $("#chat-input").style.height = promptHeight;
        $("#chat-input").addEventListener("input", updateTokenCount);

        const textareaObserver = new ResizeObserver((entries) => {
          for (let entry of entries) {
            const h = entry.target.style.height;
            if (!h) continue;
            promptHeight = h;
            saveState();
          }
        });
        textareaObserver.observe($("#chat-input"));

        chats.sort((a, b) => Number(b.id) - Number(a.id));

        if (!currentChatId && chats.length > 0) currentChatId = chats[0].id;

        for (const f of files) {
          if (f.isEmbedding && f.progress < 100) {
            startEmbeddingLoop(f.id);
          } else if (f.progress >= 100) {
            f.isEmbedding = false;
          }
        }

        renderApp();
      }

      init();
    </script>
  </body>
</html>
