      // --- EMBEDDINGS & RAG ---
      async function fetchEmbeddings(texts, signal = null) {
        let base =
          config.embeddingsUrl && config.embeddingsUrl.trim() !== ""
            ? config.embeddingsUrl.trim().replace(/\/+$/, "")
            : config.url.replace(/\/+$/, "");

        if (base.endsWith("/chat/completions"))
          base = base.replace("/chat/completions", "");
        const endpoint = base + "/embeddings";

        const apiKey =
          config.embeddingsKey && config.embeddingsKey.trim() !== ""
            ? config.embeddingsKey.trim()
            : config.key;

        const res = await fetch(endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: config.embeddingsModel || "text-embedding-3-small",
            input: texts,
          }),
          signal: signal || undefined,
        });

        if (!res.ok) {
          const errText = await res.text();
          let errMsg = errText;
          try {
            errMsg = JSON.parse(errText).error.message;
          } catch (e) {}
          throw new Error(`API Error: ${res.status} ${res.statusText}\n${errMsg}`);
        }
        const data = await res.json();
        return data.data.sort((a, b) => a.index - b.index).map((d) => d.embedding);
      }

      // Helper function to fetch all individual chunk records for a file
      async function getFileChunks(id) {
        const chunks = await dbGetByPrefix(`mf_chunk_${id}_`);
        return chunks.sort((a, b) => a.index - b.index);
      }

      async function refreshFileChunks(id) {
        const meta = files.find((f) => f.id === id);
        if (!meta) return;
        const data = await dbGet(`mf_filedata_${id}`);
        if (!data) return;

        const text = data.text || "";
        let chunks = [];

        const chunkerCode =
          meta.customChunker && meta.customChunker.trim() !== ""
            ? meta.customChunker
            : FILE_SETTING_DEFAULTS.customChunker.default;

        if (meta.customChunks && meta.customChunks.trim() !== "") {
          try {
            const parsed = JSON.parse(meta.customChunks);
            if (Array.isArray(parsed)) chunks = parsed;
          } catch (e) {
            console.error("Error parsing customChunks:", e);
          }
        } else {
          try {
            const fn = new AsyncFunction("fileContents", "config", chunkerCode);
            const res = await fn(text, config);
            if (Array.isArray(res)) chunks = res;
          } catch (e) {
            console.error("Error executing customChunker:", e);
          }
        }

        if (!Array.isArray(chunks) || chunks.length === 0) {
          chunks = [text];
        }

        chunks = chunks.filter((c) => c !== null && c !== undefined);

        const oldChunks = await getFileChunks(id);
        let changed = false;
        let newChunks = [];
        let chunkIndex = 0;

        for (const c of chunks) {
          const stringified = typeof c === "string" ? c : JSON.stringify(c);

          let existing = oldChunks.find(
            (old) => old.text === stringified && old.vector,
          );
          if (!existing) changed = true;

          newChunks.push({
            index: chunkIndex++,
            text: stringified,
            raw: c,
            vector: existing ? existing.vector : null,
          });
        }

        if (oldChunks.length !== newChunks.length) changed = true;
        else if (oldChunks.some((old, i) => old.text !== newChunks[i].text))
          changed = true;

        if (changed) {
          // Purge the old chunks from IndexedDB
          await dbDeleteByPrefix(`mf_chunk_${id}_`);

          // Use multiple sets to quickly write out the separated chunk records
          const entries = newChunks.map((c) => [
            `mf_chunk_${id}_${String(c.index).padStart(6, "0")}`,
            c,
          ]);
          await dbSetMultiple(entries);

          meta.chunkCount = newChunks.length;
          meta.embeddedCount = newChunks.filter((c) => c.vector).length;

          // Calculate ignored count so the progress bar is accurate even before the loop starts
          const CHUNK_LIMIT =
            meta.chunkMaxTokens !== undefined && meta.chunkMaxTokens !== ""
              ? parseInt(meta.chunkMaxTokens, 10)
              : parseInt(config.chunkMaxTokens, 10) || 1024;
          const MAX_TOKENS = parseInt(config.chunkBatchMaxTokens) || 8192;

          let ignoredCount = 0;
          for (const c of newChunks) {
            if (!c.vector) {
              const chunkStr =
                typeof c.text === "string" ? c.text : JSON.stringify(c.text) || "";
              const chunkTokens = Math.ceil(chunkStr.length / 4);
              if (chunkTokens > CHUNK_LIMIT || chunkTokens > MAX_TOKENS) {
                ignoredCount++;
              }
            }
          }

          const processedCount = meta.embeddedCount + ignoredCount;
          meta.exactProgress =
            meta.chunkCount > 0 ? (processedCount / meta.chunkCount) * 100 : 0;
          meta.progress = Math.round(meta.exactProgress);

          if (meta.progress >= 100) meta.isEmbedding = false;

          // Save metadata without chunks attached
          await dbSet(`mf_filedata_${id}`, data);
          saveState();
        }
      }

      async function getNextChunkBatch(id, maxBatch, maxTokens, chunkLimit) {
        const db = await getDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readonly");
          const store = transaction.objectStore(STORE_NAME);
          const prefix = `mf_chunk_${id}_`;
          const range = IDBKeyRange.bound(prefix, prefix + "\uffff");
          const request = store.openCursor(range);

          const batch = [];
          let currentTokens = 0;
          let ignoredCount = 0;
          let embeddedCount = 0;
          let chunkCount = 0;

          request.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
              chunkCount++;
              const c = cursor.value;
              if (c.vector) {
                embeddedCount++;
              } else {
                const chunkStr =
                  typeof c.text === "string" ? c.text : JSON.stringify(c.text) || "";
                const chunkTokens = Math.ceil(chunkStr.length / 4);

                if (chunkTokens > chunkLimit || chunkTokens > maxTokens) {
                  ignoredCount++;
                } else {
                  if (
                    batch.length < maxBatch &&
                    currentTokens + chunkTokens <= maxTokens
                  ) {
                    batch.push(c);
                    currentTokens += chunkTokens;
                  }
                }
              }
              cursor.continue();
            } else {
              resolve({ batch, ignoredCount, embeddedCount, chunkCount });
            }
          };
          request.onerror = () => reject(request.error);
        });
      }

      async function startEmbeddingLoop(id) {
        if (!config.embeddingsModel || config.embeddingsModel.trim() === "") return;

        const currentMeta = files.find((f) => f.id === id);
        if (!currentMeta || !currentMeta.isEmbedding) return;

        if (currentMeta._embeddingLoopActive) return; // Concurrency block
        currentMeta._embeddingLoopActive = true;

        if (embeddingAbortControllers[id]) {
          embeddingAbortControllers[id].abort();
        }
        embeddingAbortControllers[id] = new AbortController();

        const MAX_BATCH = parseInt(config.chunkBatchSize) || 100;
        const MAX_TOKENS = parseInt(config.chunkBatchMaxTokens) || 8192;
        const CHUNK_LIMIT =
          currentMeta.chunkMaxTokens !== undefined &&
          currentMeta.chunkMaxTokens !== ""
            ? parseInt(currentMeta.chunkMaxTokens, 10)
            : parseInt(config.chunkMaxTokens, 10) || 1024;

        let loopStartTime = Date.now();
        let loopStartEmbeddedCount = null;

        try {
          while (true) {
            const meta = files.find((f) => f.id === id);
            if (!meta || !meta.isEmbedding) break;

            const data = await dbGet(`mf_filedata_${id}`);
            if (!data) break;

            // Always load chunks FRESH in the while loop to prevent race conditions
            // Using cursor-based stream to bypass IPC limits and reduce massive RAM spikes
            let batchData = await getNextChunkBatch(
              id,
              MAX_BATCH,
              MAX_TOKENS,
              CHUNK_LIMIT,
            );

            if (batchData.chunkCount === 0) {
              await refreshFileChunks(id);
              batchData = await getNextChunkBatch(
                id,
                MAX_BATCH,
                MAX_TOKENS,
                CHUNK_LIMIT,
              );
              const m = files.find((f) => f.id === id);
              if (!m || !m.isEmbedding) break;
            }

            const { batch, ignoredCount } = batchData;

            if (batch.length === 0) {
              // If batch is 0, we either finished or the remaining chunks are permanently ignored
              meta.exactProgress = 100.0;
              meta.progress = 100;
              meta.isEmbedding = false;
              meta.embeddingSpeed = null;
              meta.embeddingEta = null;
              renderFileList();
              if (isAdvancedRAGSettingsOpen && activeAdvancedRAGFileId === id)
                renderApp(true);
              break;
            }

            try {
              const batchTexts = batch.map((c) => c.text);
              const signal = embeddingAbortControllers[id].signal;
              const embs = await fetchEmbeddings(batchTexts, signal);

              const updateEntries = [];
              batch.forEach((c, i) => {
                // Convert array to Float32Array to compress Vector by 50-70% in memory
                c.vector = new Float32Array(embs[i]);
                updateEntries.push([
                  `mf_chunk_${id}_${String(c.index).padStart(6, "0")}`,
                  c,
                ]);
              });

              // Save ONLY the freshly processed chunk batches back to the DB to prevent massive rewrites
              await dbSetMultiple(updateEntries);

              meta.embeddedCount = batchData.embeddedCount + batch.length;
              meta.chunkCount = batchData.chunkCount;

              // Progress is computed as (Successfully Embedded + Ignored) / Total Chunks
              const processedCount = meta.embeddedCount + ignoredCount;
              meta.exactProgress =
                meta.chunkCount > 0
                  ? (processedCount / meta.chunkCount) * 100
                  : 100.0;
              meta.progress = Math.round(meta.exactProgress);

              if (loopStartEmbeddedCount === null) {
                loopStartEmbeddedCount = meta.embeddedCount - batch.length;
              }

              const elapsedSec = (Date.now() - loopStartTime) / 1000;
              const chunksDone = meta.embeddedCount - loopStartEmbeddedCount;
              if (elapsedSec > 0 && chunksDone > 0) {
                meta.embeddingSpeed = chunksDone / elapsedSec;
                meta.embeddingEta =
                  (meta.chunkCount - processedCount) / meta.embeddingSpeed;
              }

              await dbSet(`mf_filedata_${id}`, data);
              saveState();
              renderFileList();
              if (isAdvancedRAGSettingsOpen && activeAdvancedRAGFileId === id)
                renderApp(true);

              await new Promise((r) => setTimeout(r, 100)); // Yield to UI
            } catch (err) {
              if (err.name === "AbortError") {
                console.log(`Embedding paused for ${meta.name}`);
              } else {
                console.error("Embedding error:", err);
                meta.isEmbedding = false;
                alert(`Embedding failed for ${meta.name}: ${err.message}`);
              }
              break;
            }
          }
        } catch (outerErr) {
          console.error("Unexpected error in embedding loop:", outerErr);
          const m = files.find((f) => f.id === id);
          if (m) m.isEmbedding = false;
        } finally {
          const finalMeta = files.find((f) => f.id === id);
          if (finalMeta) {
            finalMeta._embeddingLoopActive = false;
            finalMeta.embeddingSpeed = null;
            finalMeta.embeddingEta = null;
          }

          if (embeddingAbortControllers[id]) {
            delete embeddingAbortControllers[id];
          }
          saveState();
          renderFileList();
        }
      }

      async function resolveAllMessages(messages, btnEl) {
        let resolved = [];

        for (let i = 0; i < messages.length; i++) {
          const msg = messages[i];

          if (msg.role === "file") {
            const meta = files.find((f) => f.id === msg.fileId);
            const mode = msg.mode || "embed";

            if (mode === "full") {
              let fileContent = msg.content;
              if (!fileContent && meta) {
                const data = await dbGet(`mf_filedata_${meta.id}`);
                if (data) {
                  let wrapperFnCode =
                    meta.fileWrapperFunc && meta.fileWrapperFunc.trim() !== ""
                      ? meta.fileWrapperFunc
                      : config.fileWrapperFunc && config.fileWrapperFunc.trim() !== ""
                        ? config.fileWrapperFunc
                        : SETTING_DEFAULTS.fileWrapperFunc.default;

                  let wrapperFn;
                  try {
                    wrapperFn = new AsyncFunction(
                      "fileContent",
                      "fileName",
                      wrapperFnCode,
                    );
                  } catch (e) {
                    console.error("Wrapper Fn Syntax Error:", e);
                    wrapperFn = async (c, n) => `\`${n}\`:\n\n\`\`\`\n${c}\n\`\`\``;
                  }

                  fileContent = await wrapperFn(data.text, meta.name);
                }
              }
              resolved.push({
                role: "user",
                content: fileContent || "*File not found.*",
              });
            }
            // If mode === "embed", we simply do not add it to the resolved array.
            // This keeps embed messages local and skips sending them to the API entirely.
          } else {
            resolved.push(msg);
          }
        }

        return resolved;
      }

      async function executeEmbedMessage(msgIndex) {
        const chat = chats.find((c) => c.id === currentChatId);
        const msg = chat.messages[msgIndex];
        if (!msg || msg.role !== "file" || msg.mode !== "embed") return;

        const meta = files.find((f) => f.id === msg.fileId);
        let fileContent = "*File not found.*";

        const btnEl = document.querySelector(
          `.msg[data-index="${msgIndex}"] button[data-action="run-embed"]`,
        );
        const origText = btnEl ? btnEl.textContent : "Embed";
        if (btnEl) btnEl.textContent = "Embedding...";

        if (meta) {
          const data = await dbGet(`mf_filedata_${meta.id}`);
          if (data) {
            let actualPrompt = msg.prompt ? msg.prompt.trim() : "";

            if (!actualPrompt) {
              let lookaheadText = [];
              for (let j = msgIndex + 1; j < chat.messages.length; j++) {
                const nextMsg = chat.messages[j];
                if (nextMsg.role === "assistant") break;
                if (nextMsg.role === "user" && nextMsg.content) {
                  lookaheadText.push(nextMsg.content);
                }
              }
              actualPrompt = lookaheadText.join("\n").trim();
            }

            const chunks = await getFileChunks(meta.id);
            const validChunks = chunks.filter((c) => c.vector);

            if (validChunks.length > 0) {
              let queryEmb = null;

              if (actualPrompt) {
                try {
                  queryEmb = (await fetchEmbeddings([actualPrompt]))[0];
                } catch (err) {
                  if (btnEl) btnEl.textContent = origText;
                  alert("Error fetching embeddings: " + err.message);
                  return;
                }
              }

              const fileMaxTokens =
                meta.maxRagTokens !== undefined && meta.maxRagTokens !== ""
                  ? parseInt(meta.maxRagTokens, 10)
                  : undefined;
              const maxTokens =
                fileMaxTokens !== undefined && !isNaN(fileMaxTokens)
                  ? fileMaxTokens
                  : msg.maxTokens || 5000;

              const fileThreshold =
                meta.ragThreshold !== undefined && meta.ragThreshold !== ""
                  ? parseFloat(meta.ragThreshold)
                  : undefined;
              const threshold =
                fileThreshold !== undefined && !isNaN(fileThreshold)
                  ? fileThreshold
                  : msg.ragThreshold || 0.0;

              validChunks.forEach((c) => {
                c.score = queryEmb ? cosSim(queryEmb, c.vector) : -c.index;
              });

              let topChunks = validChunks.filter(
                (c) => !queryEmb || c.score >= threshold,
              );
              topChunks.sort((a, b) => b.score - a.score);

              let currentTokens = 0;
              let finalChunksInternal = [];

              let retrievalFnCode =
                meta.retrievalFunc && meta.retrievalFunc.trim() !== ""
                  ? meta.retrievalFunc
                  : FILE_SETTING_DEFAULTS.retrievalFunc.default;
              let dedupFnCode =
                meta.dedupFunc && meta.dedupFunc.trim() !== ""
                  ? meta.dedupFunc
                  : FILE_SETTING_DEFAULTS.dedupFunc.default;
              let mergeFnCode =
                meta.mergeChunksFunc && meta.mergeChunksFunc.trim() !== ""
                  ? meta.mergeChunksFunc
                  : FILE_SETTING_DEFAULTS.mergeChunksFunc.default;

              let retrievalFn, dedupFn, mergeFn;

              try {
                retrievalFn = new AsyncFunction(
                  "chunk",
                  "fileContents",
                  retrievalFnCode,
                );
              } catch (e) {
                console.error("Retrieval Fn Syntax Error:", e);
                retrievalFn = async (c, t) => c;
              }
              try {
                dedupFn = new AsyncFunction(
                  "currentData",
                  "existingData",
                  dedupFnCode,
                );
              } catch (e) {
                console.error("Dedup Fn Syntax Error:", e);
                dedupFn = async (a, b) => a === b;
              }
              try {
                mergeFn = new AsyncFunction("finalChunks", mergeFnCode);
              } catch (e) {
                console.error("Merge Fn Syntax Error:", e);
                mergeFn = async (c) =>
                  c
                    .map((x) => (typeof x === "string" ? x : JSON.stringify(x)))
                    .join("...");
              }

              for (let j = 0; j < topChunks.length; j++) {
                const curr = topChunks[j];
                let finalData = null;

                try {
                  const chunkArg = curr.raw !== undefined ? curr.raw : curr.text;
                  const retrievedData = await retrievalFn(chunkArg, data.text);
                  if (retrievedData !== null && retrievedData !== undefined) {
                    finalData = retrievedData;
                  }
                } catch (e) {
                  console.error("Post-processing error:", e);
                  finalData = curr.raw !== undefined ? curr.raw : curr.text;
                }

                if (finalData !== null && finalData !== undefined) {
                  let isDup = false;
                  try {
                    for (const d of finalChunksInternal) {
                      if (await dedupFn(finalData, d.data)) {
                        isDup = true;
                        break;
                      }
                    }
                  } catch (e) {
                    console.error("Deduplication error:", e);
                  }

                  if (!isDup) {
                    const strForTokens =
                      typeof finalData === "string"
                        ? finalData
                        : JSON.stringify(finalData) || "";
                    const chunkTokens = Math.ceil(strForTokens.length / 4);

                    if (
                      finalChunksInternal.length > 0 &&
                      currentTokens + chunkTokens > maxTokens
                    ) {
                      break;
                    }

                    currentTokens += chunkTokens;
                    finalChunksInternal.push({
                      index: curr.index,
                      data: finalData,
                    });
                  }
                }
              }

              finalChunksInternal.sort((a, b) => a.index - b.index);
              const finalChunks = finalChunksInternal.map((x) => x.data);

              let mergedContent = "";
              try {
                mergedContent = await mergeFn(finalChunks);
              } catch (e) {
                console.error("Merge function error:", e);
                mergedContent = finalChunks
                  .map((c) => (typeof c === "string" ? c : JSON.stringify(c)))
                  .join("...");
              }

              fileContent = mergedContent;
            } else {
              fileContent = "*File unindexed or no valid chunks.*";
            }
          }
        }

        let wrapperFnCode =
          meta && meta.fileWrapperFunc && meta.fileWrapperFunc.trim() !== ""
            ? meta.fileWrapperFunc
            : config.fileWrapperFunc && config.fileWrapperFunc.trim() !== ""
              ? config.fileWrapperFunc
              : SETTING_DEFAULTS.fileWrapperFunc.default;

        let wrapperFn;
        try {
          wrapperFn = new AsyncFunction("fileContent", "fileName", wrapperFnCode);
        } catch (e) {
          console.error("Wrapper Fn Syntax Error:", e);
          wrapperFn = async (c, n) => `\`${n}\`:\n\n\`\`\`\n${c}\n\`\`\``;
        }

        const formatted = await wrapperFn(fileContent, msg.fileName);

        if (btnEl) btnEl.textContent = origText;

        chat.messages.push({
          role: "user",
          content: formatted,
        });

        invalidateTokenCache();
        saveState();
        appendMessageToDOM(
          chat.messages[chat.messages.length - 1],
          chat.messages.length - 1,
        );
        updateTokenCount();
      }

      async function exportChunksAndVectors() {
        if (!activeAdvancedRAGFileId) return;
        const chunks = await getFileChunks(activeAdvancedRAGFileId);
        if (!chunks || chunks.length === 0) return alert("No chunks found.");

        const payload = {
          model: config.embeddingsModel,
          chunks: chunks.map((c) => ({
            text: c.text,
            raw: c.raw !== undefined ? c.raw : c.text,
            vector_b64: encodeVectorToBase64(c.vector),
          })),
        };

        const dataStr = JSON.stringify(payload, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `file-vectors-${activeAdvancedRAGFileId}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function importChunksAndVectors() {
        if (!activeAdvancedRAGFileId) return;
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const imported = JSON.parse(event.target.result);
              if (!imported.chunks || !Array.isArray(imported.chunks))
                throw new Error("Invalid format.");

              if (imported.model !== config.embeddingsModel) {
                alert(
                  `Model mismatch!\n\nExported model: '${imported.model}'\nCurrent model: '${config.embeddingsModel}'\n\nImport cancelled. To bypass this, manually edit the 'model' field in the JSON file to match your current model.`,
                );
                return;
              }

              const data = await dbGet(`mf_filedata_${activeAdvancedRAGFileId}`);
              if (!data) return;

              const raws = imported.chunks.map((c) =>
                c.raw !== undefined ? c.raw : c.text,
              );
              const meta = files.find((f) => f.id === activeAdvancedRAGFileId);
              meta.customChunks = JSON.stringify(raws, null, 2);

              // Wipe old chunks
              await dbDeleteByPrefix(`mf_chunk_${activeAdvancedRAGFileId}_`);

              let chunkIndex = 0;
              const entries = [];
              const chunks = imported.chunks.map((c) => {
                let vec = c.vector_b64
                  ? decodeBase64ToVector(c.vector_b64)
                  : c.vector
                    ? new Float32Array(c.vector)
                    : null;
                let mapped = {
                  index: chunkIndex++,
                  text: c.text,
                  raw: c.raw !== undefined ? c.raw : c.text,
                  vector: vec,
                };
                entries.push([
                  `mf_chunk_${activeAdvancedRAGFileId}_${String(mapped.index).padStart(6, "0")}`,
                  mapped,
                ]);
                return mapped;
              });

              await dbSetMultiple(entries);

              meta.chunkCount = chunks.length;
              meta.embeddedCount = chunks.filter((c) => c.vector).length;
              meta.exactProgress =
                meta.chunkCount > 0
                  ? (meta.embeddedCount / meta.chunkCount) * 100
                  : 0;
              meta.progress = Math.round(meta.exactProgress);
              if (meta.progress >= 100) meta.isEmbedding = false;

              await dbSet(`mf_filedata_${activeAdvancedRAGFileId}`, data);
              saveState();
              if (activeAdvancedRAGSetting === "customChunks") {
                await selectAdvancedRAGSetting("customChunks");
              } else {
                renderApp(true);
              }
              alert("Imported chunks and vectors successfully.");
            } catch (err) {
              alert("Failed to import: " + err.message);
            }
          };
          reader.readAsText(file);
        };
        input.click();
      }

      async function appendFileMessage(fileId, mode = "full") {
        const meta = files.find((f) => f.id === fileId);
        if (!meta) return;
        suspendSuperSecretSettings();
        resetEditState();

        if (!currentChatId) newChat();
        const chat = chats.find((c) => c.id === currentChatId);

        let approxTokens = Math.ceil((meta.textLength || 0) / 4);
        let content = "";

        if (mode === "full") {
          const data = await dbGet(`mf_filedata_${meta.id}`);
          const fileText = data ? data.text : "";

          let wrapperFnCode =
            meta.fileWrapperFunc && meta.fileWrapperFunc.trim() !== ""
              ? meta.fileWrapperFunc
              : config.fileWrapperFunc && config.fileWrapperFunc.trim() !== ""
                ? config.fileWrapperFunc
                : SETTING_DEFAULTS.fileWrapperFunc.default;

          let wrapperFn;
          try {
            wrapperFn = new AsyncFunction("fileContent", "fileName", wrapperFnCode);
          } catch (e) {
            console.error("Wrapper Fn Syntax Error:", e);
            wrapperFn = async (c, n) => `\`${n}\`:\n\n\`\`\`\n${c}\n\`\`\``;
          }

          content = await wrapperFn(fileText, meta.name);
          approxTokens = Math.ceil(content.length / 4);
        }

        chat.messages.push({
          role: "file",
          fileId: meta.id,
          fileName: meta.name,
          prompt: "",
          mode: mode,
          approxTokens: approxTokens,
          content: content,
          maxTokens: parseInt(config.maxRagTokens, 10) || 5000,
          ragThreshold: parseFloat(config.ragThreshold) || 0.0,
        });

        if (window.innerWidth <= 768) {
          isSidebarHidden = true;
          applySidebarState();
        }

        invalidateTokenCache();
        saveState();
        appendMessageToDOM(
          chat.messages[chat.messages.length - 1],
          chat.messages.length - 1,
        );
        updateTokenCount();
      }

      async function resetAllFileEmbeddings() {
        for (const meta of files) {
          meta.progress = 0;
          meta.exactProgress = 0;
          meta.embeddedCount = 0;
          meta.chunkCount = 0;
          meta.isEmbedding = false;
          meta.embeddingSpeed = null;
          meta.embeddingEta = null;
          if (embeddingAbortControllers[meta.id]) {
            embeddingAbortControllers[meta.id].abort();
            delete embeddingAbortControllers[meta.id];
          }
          await dbDeleteByPrefix(`mf_chunk_${meta.id}_`);
        }
        saveState();
        renderApp();

      // --- LLM API & GOD MODE ---
      async function executeGodMode(code) {
        let logs = [];
        const safeStr = (obj) => {
          try {
            return typeof obj === "object"
              ? JSON.stringify(obj, null, 2)
              : String(obj);
          } catch {
            return Object.prototype.toString.call(obj);
          }
        };
        const proxyConsole = {
          log: (...args) => logs.push(args.map(safeStr).join(" ")),
          error: (...args) => logs.push("ERROR: " + args.map(safeStr).join(" ")),
        };
        let result,
          errorStr = "";
        try {
          const execFn = new (Object.getPrototypeOf(
            async function () {},
          ).constructor)("console", code);
          result = await execFn(proxyConsole);
        } catch (err) {
          errorStr = err.toString();
        }

        let out = "**Execution Result:**\n```text\n";
        if (logs.length) out += logs.join("\n") + "\n";
        if (result !== undefined) out += "Return: " + safeStr(result) + "\n";
        if (errorStr) out += "Error: " + errorStr + "\n";
        if (!logs.length && result === undefined && !errorStr)
          out += "Code executed successfully with no output.\n";
        return out + "```";
      }

      async function sendMessage(autoLoopDepth = 0, skipApi = false) {
        const btn = $("#send-btn");
        const MAX_LOOPS = 5;

        if (autoLoopDepth >= MAX_LOOPS) {
          const chat = chats.find((c) => c.id === currentChatId);
          chat.messages.push({
            role: "error",
            content: `**System Error:** Maximum execution loop depth (${MAX_LOOPS}) reached.`,
          });
          invalidateTokenCache();
          saveState();
          appendMessageToDOM(
            chat.messages[chat.messages.length - 1],
            chat.messages.length - 1,
          );
          return;
        }

        const isAutoLoop = autoLoopDepth > 0;
        if (currentAbortController && !isAutoLoop) {
          currentAbortController.abort();
          currentAbortController = null;
          btn.textContent = "Send";
          updateTokenCount();
          return;
        }

        const inputEl = $("#chat-input");
        let text = inputEl.value.trim();

        if (!isAutoLoop) {
          if (!text) return;
          if (!config.key && !skipApi)
            return alert("Please enter your API key in the settings first.");

          if (!currentChatId) {
            newChat();
          }

          const chat = chats.find((c) => c.id === currentChatId);

          if (!chat.messages.length) {
            const lastDoubleNewline = text.lastIndexOf("\n\n");
            const titleSource =
              lastDoubleNewline !== -1
                ? text.substring(lastDoubleNewline + 2).trim()
                : text;
            chat.title =
              titleSource.substring(0, 30) + (titleSource.length > 30 ? "..." : "");
            renderChatList();
          }

          chat.messages.push({ role: "user", content: text });
          inputEl.value = "";
          invalidateTokenCache();
          saveState();
          appendMessageToDOM(
            chat.messages[chat.messages.length - 1],
            chat.messages.length - 1,
          );
          updateTokenCount();
        }

        if (skipApi) return;

        currentAbortController = new AbortController();
        btn.textContent = isAutoLoop
          ? `Thinking (Loop ${autoLoopDepth}/${MAX_LOOPS})...`
          : "Thinking...";

        try {
          const chat = chats.find((c) => c.id === currentChatId);
          let cleanMessages = chat.messages
            .filter((m) => m.role !== "error")
            .map((m) => {
              if (m.role === "file") return { ...m };
              return { role: m.role, content: m.content || "" };
            });

          if (config.godMode) {
            cleanMessages.unshift({
              role: "system",
              content: config.godModePrompt || DEFAULT_GOD_MODE_PROMPT,
            });
          }

          cleanMessages = await resolveAllMessages(cleanMessages, btn);

          // After resolving file embeddings, we wait on the API. Set state to Thinking...
          btn.textContent = isAutoLoop
            ? `Thinking (Loop ${autoLoopDepth}/${MAX_LOOPS})...`
            : "Thinking...";

          const isStream = config.streamResponse !== "false";

          const payload = {
            model: $("#model-select").value,
            messages: cleanMessages,
            stream: isStream,
          };

          if (config.temperature !== "" && config.temperature !== undefined)
            payload.temperature = parseFloat(config.temperature);
          if (config.top_p !== "" && config.top_p !== undefined)
            payload.top_p = parseFloat(config.top_p);
          if (
            config.frequency_penalty !== "" &&
            config.frequency_penalty !== undefined
          )
            payload.frequency_penalty = parseFloat(config.frequency_penalty);
          if (config.presence_penalty !== "" && config.presence_penalty !== undefined)
            payload.presence_penalty = parseFloat(config.presence_penalty);
          if (config.max_tokens !== "" && config.max_tokens !== undefined)
            payload.max_tokens = parseInt(config.max_tokens, 10);

          const response = await fetch(`${config.url}/chat/completions`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${config.key}`,
            },
            body: JSON.stringify(payload),
            signal: currentAbortController.signal,
          });

          if (!response.ok)
            throw new Error(
              (await response.json().catch(() => ({}))).error?.message ||
                `HTTP ${response.status}`,
            );

          // Target API Responded. Generating text...
          btn.textContent = isAutoLoop
            ? `Generating (Loop ${autoLoopDepth}/${MAX_LOOPS})...`
            : "Generating...";

          chat.messages.push({ role: "assistant", content: "" });
          const msgIndex = chat.messages.length - 1;
          appendMessageToDOM(chat.messages[msgIndex], msgIndex);
          invalidateTokenCache();

          let reply = "";

          if (!isStream) {
            const data = await response.json();
            reply = data.choices[0]?.message?.content || "";
            chat.messages[msgIndex].content = reply;
            updateMessageContentInDOM(msgIndex, reply, true, "top");
          } else {
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";
            let lastRenderTime = 0;

            try {
              while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                let lines = buffer.split("\n");
                buffer = lines.pop();

                for (let line of lines) {
                  line = line.trim();
                  if (line.startsWith("data: ")) {
                    if (line === "data: [DONE]") continue;
                    try {
                      const data = JSON.parse(line.slice(6));
                      const chunk = data.choices[0]?.delta?.content;
                      if (chunk) reply += chunk;
                    } catch (e) {}
                  }
                }

                chat.messages[msgIndex].content = reply;

                const now = Date.now();
                // Throttle UI rendering to ~10fps to avoid blocking thread
                if (now - lastRenderTime > 100) {
                  updateMessageContentInDOM(msgIndex, reply, false);
                  lastRenderTime = now;
                }
              }
            } catch (err) {
              if (err.name === "AbortError") {
                reply += "\n\n*[Stopped by user]*";
                chat.messages[msgIndex].content = reply;
              } else {
                throw err;
              }
            }

            chat.messages[msgIndex].content = reply;
            updateMessageContentInDOM(msgIndex, reply, true, "none");
          }

          saveState();

          if (config.godMode && reply) {
            const runMatches = [...reply.matchAll(/<run>([\s\S]*?)<\/run>/g)];
            if (runMatches.length > 0) {
              for (const match of runMatches) {
                const code = match[1].trim();
                const result = await executeGodMode(code);
                chat.messages.push({ role: "user", content: result });
                invalidateTokenCache();
                saveState();
                appendMessageToDOM(
                  chat.messages[chat.messages.length - 1],
                  chat.messages.length - 1,
                );
              }
              return sendMessage(autoLoopDepth + 1);
            }
          }
        } catch (error) {
          if (error.name !== "AbortError") {
            const chat = chats.find((c) => c.id === currentChatId);
            chat.messages.push({
              role: "error",
              content: `**Error:**\n\n${error.message}`,
            });
            invalidateTokenCache();
            saveState();
            appendMessageToDOM(
              chat.messages[chat.messages.length - 1],
              chat.messages.length - 1,
            );
          }
        }

        currentAbortController = null;
        btn.textContent = "Send";
        saveState();
        updateTokenCount();
      }

      function updateTokenCount() {
        const btn = $("#send-btn");
        if (!btn) return;

        if (
          btn.textContent.includes("Thinking") ||
          btn.textContent.includes("Generating") ||
          btn.textContent.includes("Embedding") ||
          btn.classList.contains("hidden")
        )
          return;

        if (cachedContextChars === -1) {
          let contextChars = 0;
          if (currentChatId) {
            const chat = chats.find((c) => c.id === currentChatId);
            if (chat && chat.messages) {
              contextChars = chat.messages.reduce((acc, m) => {
                if (m.role === "file") {
                  if (m.mode === "full") return acc + (m.content || "").length;
                  // Config message logic (embed) is no longer sent to the API!
                  return acc;
                }
                return acc + (m.content || "").length;
              }, 0);
            }
          }

          if (config.godMode) {
            contextChars += (config.godModePrompt || DEFAULT_GOD_MODE_PROMPT).length;
          }
          cachedContextChars = contextChars;
        }

        const inputVal = $("#chat-input").value || "";
        const totalChars = inputVal.length + cachedContextChars;
        const tokens = Math.ceil(totalChars / 4);

        if (tokens < 1000) {
          btn.textContent = "Send";
        } else {
          let label;
          if (tokens >= 1000000) {
            label = (tokens / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
          } else {
            label = (tokens / 1000).toFixed(1).replace(/\.0$/, "") + "k";
          }
          btn.textContent = `Send (${label} tokens)`;
        }
      }

      // --- RENDERING LOGIC ---
      marked.use({
        extensions: [
          {
            name: "math",
            level: "inline",
            start(src) {
              return src.match(/\$/)?.index;
            },
            tokenizer(src) {
              const blockMatch = /^\$\$([\s\S]+?)\$\$/.exec(src);
              if (blockMatch)
                return { type: "math", raw: blockMatch[0], text: blockMatch[1] };
              const inlineMatch = /^\$([^\s$](?:\\.|[^$\n])*?)\$/.exec(src);
              if (inlineMatch)
                return { type: "math", raw: inlineMatch[0], text: inlineMatch[1] };
            },
            renderer(token) {
              return escapeHTML(token.raw);
            },
          },
        ],
      });

          list.style.overflowY = "auto";

          list.style.maxHeight = "";
          list.style.overflowY = "";

        if (!files.length)
          return (list.innerHTML =
            '<p style="font-size:0.8em; color:#666;">No files uploaded.</p>');

        const embeddingsEnabled = !!(
          config.embeddingsModel && config.embeddingsModel.trim() !== ""
        );

        list.innerHTML = files
          .map((f) => {
            let embedBtn = "";
            let progressBar = "";
            let progressStats = "";

            if (embeddingsEnabled) {
              if (f.isEmbedding && f.progress < 100) {
                const speed = f.embeddingSpeed
                  ? `${f.embeddingSpeed.toFixed(1)} c/s`
                  : "...";
                let eta = "...";
                if (f.embeddingEta !== undefined && f.embeddingEta !== null) {
                  if (f.embeddingEta > 3600) {
                    const h = Math.floor(f.embeddingEta / 3600);
                    const m = Math.floor((f.embeddingEta % 3600) / 60);
                    const s = Math.round(f.embeddingEta % 60);
                    eta = `${h}h ${m}m ${s}s`;
                  } else if (f.embeddingEta > 60) {
                    const m = Math.floor(f.embeddingEta / 60);
                    const s = Math.round(f.embeddingEta % 60);
                    eta = `${m}m ${s}s`;
                  } else {
                    eta = `${Math.round(f.embeddingEta)}s`;
                  }
                }
                const pct =
                  f.exactProgress !== undefined
                    ? f.exactProgress.toFixed(1)
                    : (f.progress || 0).toFixed(1);
                progressStats = `
                  <div style="font-size: 0.75em; color: #666; text-align: left; margin-top: 2px;">
                    <div>Progress: ${pct}% (${speed})</div>
                    <div>ETA: ${eta}</div>

              }

              const widthPct =
                f.exactProgress !== undefined ? f.exactProgress : f.progress;
              progressBar = `<div class="file-progress-bar" style="width: ${widthPct}%"></div>`;

          );

          if (msg.mode === "embed") {

            if (msg.prompt) displayContent += `\n\n**Search Prompt:** ${msg.prompt}`;

            if (isEditing) {
              configHtml = `
      <div style="display:flex; gap:15px; flex-wrap:wrap; margin-top:10px; align-items:center; background: #eee; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">

      <label style="display:flex; flex-direction:column; font-size:0.85em; font-weight:bold;">Match Threshold <input type="number" step="0.1" class="embed-cfg-threshold" value="${msg.ragThreshold || 0.0}" style="width:100px; margin:4px 0 0 0; padding:4px; font-weight:normal;"></label>
      </div>`;
            }
          } else {
            displayContent = `*Estimated file size: ~${msg.approxTokens || 0} tokens*`;
          }
        }

        let actionsHtml = "";

              <button data-action="delete">Delete</button>

                  <option value="system" ${msg.role === "system" ? "selected" : ""}>system</option>
                  ${msg.role === "error" ? `<option value="error" selected>error</option>` : ""}
                </select>`
              }

      function appendMessageToDOM(msg, index) {
        const container = $("#chat-container");

        const emptyMsg = container.querySelector(".empty-chat-msg");
        if (emptyMsg) emptyMsg.remove();

        const wrapper = document.createElement("div");
        wrapper.innerHTML = generateMessageHTML(msg, index, false);

        const msgEl = wrapper.firstElementChild;
        container.appendChild(msgEl);

        renderMathInElement(msgEl, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
          ],
          output: "htmlAndMathml",
          throwOnError: false,
        });
        Prism.highlightAllUnder(msgEl);
        container.scrollTop = container.scrollHeight;
      }

      function updateMessageInDOM(index) {
        const chat = chats.find((c) => c.id === currentChatId);
        const msg = chat.messages[index];
        const existingEl = document.querySelector(`.msg[data-index="${index}"]`);

        if (!existingEl) return renderCurrentChat();

        const wrapper = document.createElement("div");
        wrapper.innerHTML = generateMessageHTML(
          msg,
          index,
          editingMessageIndex === index,
        );
        const newEl = wrapper.firstElementChild;

        existingEl.replaceWith(newEl);
        renderMathInElement(newEl, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
          ],
          output: "htmlAndMathml",
          throwOnError: false,
        });
        Prism.highlightAllUnder(newEl);
      }

      function updateMessageContentInDOM(
        index,
        content,
        isFinal = true,
        alignMode = "none",
      ) {
        const el = document.querySelector(`.msg[data-index="${index}"] .msg-content`);
        if (!el) return;

        let displayContent = content;
        displayContent = displayContent.replace(
          /<run>([\s\S]*?)<\/run>/g,
          (match, code) =>
            `**Executing Code:**\n\`\`\`javascript\n${code.trim()}\n\`\`\``,
        );

        el.innerHTML = marked.parse(displayContent);
        if (isFinal) {
          renderMathInElement(el, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
            ],
            output: "htmlAndMathml",
            throwOnError: false,
          });
          Prism.highlightAllUnder(el);

          const container = $("#chat-container");
          if (alignMode === "top") {
            const msgEl = el.closest(".msg");
            if (msgEl) {
              container.scrollTop = msgEl.offsetTop - 15;
            }
          } else if (alignMode === "bottom") {
            container.scrollTop = container.scrollHeight;
          }
        }
      }

      function renderCurrentChat(preserveScroll = false) {
        const container = $("#chat-container");
        const prevScroll = container.scrollTop;

        if (isSuperSecretSettingsOpen || isAdvancedRAGSettingsOpen) {
          const isAdvanced = isAdvancedRAGSettingsOpen;
          const settingsDefaults = isAdvanced
            ? FILE_SETTING_DEFAULTS
            : SETTING_DEFAULTS;
          const activeSetting = isAdvanced
            ? activeAdvancedRAGSetting
            : activeSuperSecretSetting;
          let targetConfig = config;
          if (isAdvanced) {
            targetConfig = files.find((f) => f.id === activeAdvancedRAGFileId) || {};
          }

          const getSettingDisplay = (k) => {
            const val = targetConfig[k];
            const isDefault =
              val === undefined || val === "" || val === settingsDefaults[k].default;

            if (isAdvanced) {
              if (k === "fileText") return "Custom";
              return isDefault ? "Default" : "Custom";
            }

            if (k === "godModePrompt") return isDefault ? "Default" : "Custom";
            if (k === "embeddingsKey") return val ? "Custom" : "API Default";
            if (k === "embeddingsModel")
              return val === "" || val === undefined ? "Disabled" : escapeHTML(val);
            if (k === "maxVisibleChats" || k === "maxVisibleFiles")
              return val === "" || val === undefined
                ? "Unlimited"
                : escapeHTML(String(val));
            if (k === "fileWrapperFunc") return isDefault ? "Default" : "Custom";

            let displayVal = val === "" || val === undefined ? "API Default" : val;
            return escapeHTML(String(displayVal));
          };

          const settingNames = {
            godModePrompt: "God Mode Prompt",
            temperature: "Temperature",
            top_p: "Top P",
            max_tokens: "Max Tokens",
            frequency_penalty: "Frequency Penalty",
            presence_penalty: "Presence Penalty",
            streamResponse: "Stream Response",
            embeddingsUrl: "Embeddings Base URL",
            embeddingsKey: "Embeddings API Key",
            embeddingsModel: "Embeddings Model",
            maxRagTokens: "Max RAG Tokens",
            ragThreshold: "RAG Match Threshold",
            chunkMaxTokens: "Max Tokens Per Chunk",
            chunkBatchSize: "Chunk Batch Size",
            chunkBatchMaxTokens: "Chunk Batch Max Tokens",
            maxVisibleChats: "Max Visible Chats",
            maxVisibleFiles: "Max Visible Files",
            fileWrapperFunc: "File Wrapper Function (JS)",

            fileText: "File Content Text",
            customChunks: "Custom Chunks (JSON)",
            customChunker: "Custom Chunking Function (JS)",
            retrievalFunc: "1. Retrieval Function (JS)",
            dedupFunc: "2. Deduplication Function (JS)",
            mergeChunksFunc: "3. Merge Chunks Function (JS)",
          };

          const categories = {};
          Object.keys(settingsDefaults).forEach((key) => {
            const cat = settingsDefaults[key].category || "Other";
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(key);
          });

          let sectionsHTML = "";
          for (const [catName, keys] of Object.entries(categories)) {
            sectionsHTML += `
              <div style="margin-top: 20px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">
                <h3 style="margin: 0; font-size: 0.9em; text-transform: uppercase; color: #666;">${catName}</h3>
              </div>
              <div style="padding: 10px 0;">`;

            sectionsHTML += keys
              .map((k) => {
                const isActive = activeSetting === k;
                const tooltip = settingsDefaults[k].tooltip;
                const onclickFn = isAdvanced
                  ? `selectAdvancedRAGSetting('${k}')`
                  : `selectSuperSecretSetting('${k}')`;
                return `<button 
                class="${isActive ? "active-setting" : ""}" 
                onclick="${onclickFn}" 
                title="${escapeHTML(tooltip)}"
                style="width:100%; margin-bottom:5px; text-align:left; font-family: monospace; display: flex; justify-content: space-between;">
                  <span>${settingNames[k] || k}</span>
                  <span style="opacity: 0.7;">${getSettingDisplay(k)}</span>
              </button>`;
              })
              .join("");

            sectionsHTML += `</div>`;
          }

          let buttonsHTML = "";
          if (isAdvanced) {
            buttonsHTML = `
              <div style="display:flex; gap:10px; margin-top: 15px; flex-wrap: wrap;">
                <button onclick="attemptChunking()" title="Generate chunks and overwrite Custom Chunks array">Attempt Chunking</button>
                <button onclick="toggleAdvancedEmbedding()" title="Start or pause embeddings for this file">${targetConfig.isEmbedding ? "⏸ Pause Embedding" : "▶ Start Embedding"}</button>
                <button onclick="exportChunksAndVectors()" title="Export JSON of Chunk & Vector pairs">Export Vectors</button>
                <button onclick="importChunksAndVectors()" title="Import JSON of Chunk & Vector pairs">Import Vectors</button>
              </div>
            `;
          }

          const resetFn = isAdvanced
            ? `resetAllAdvancedRAGSettings()`
            : `resetAllSuperSecretSettings()`;
          const title = isAdvanced
            ? `Advanced RAG Settings`
            : `Super Secret Settings`;
          const subtitle = isAdvanced
            ? `Configure specific embedding and retrieval logic for this file. (${escapeHTML(targetConfig.name || "File")})`
            : `Advanced engine parameters. Hover over a setting to see its description.`;

          container.innerHTML = `
            <div>
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">${title}</h2>
                <button onclick="${resetFn}">Reset All</button>
              </div>
              <p style="margin-top: 5px; font-size: 0.85em; color: #555;">
                ${subtitle}
              </p>
              ${buttonsHTML}
              ${sectionsHTML}
            </div>
          `;
          return;
        }

        if (!currentChatId)
          return (container.innerHTML =
            '<h3 style="margin:0;">No chat selected.</h3>');
        const chat = chats.find((c) => c.id === currentChatId);

        let html = "";

        if (config.godMode) {
          html += `
            <div class="msg system">
              <div class="msg-meta">
                <span>System</span>
                <div class="msg-actions"><span style="font-size: 0.8em; color: #888;">[Read-Only]</span></div>
              </div>
              <div class="msg-content">${marked.parse("**JS Execution Enabled**. Proceed with caution.")}</div>
            </div>
          `;
        }

        if (!chat.messages.length && !config.godMode) {
          html +=
            '<p class="empty-chat-msg" style="margin:0; padding-top: 15px;">It is empty in here. Send a prompt.</p>';
        } else {
          html += chat.messages
            .map((msg, i) => generateMessageHTML(msg, i, editingMessageIndex === i))
            .join("");
        }

        container.innerHTML = html;

        renderMathInElement(container, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
          ],
          output: "htmlAndMathml",
          throwOnError: false,
        });
        Prism.highlightAllUnder(container);

        if (preserveScroll) container.scrollTop = prevScroll;
        else {
          const lastMsg = container.lastElementChild;
          if (lastMsg && lastMsg.classList.contains("msg")) {
            container.scrollTop =
              lastMsg.classList.contains("user") || lastMsg.classList.contains("file")
                ? container.scrollHeight
                : lastMsg.offsetTop - 15;
          }
        }

        updateTokenCount();
      }

      // --- DOM EVENT DELEGATION ---
      $("#settings-heading").addEventListener("click", (e) => {
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault();
          toggleSuperSecretSettings();
        }
      });

      $("#sidebar").addEventListener("click", (e) => {
        const item = e.target.closest(".chat-item");
        if (!item) return;
        const id = item.dataset.id;
        const type = item.dataset.type || "chat";
        const action = e.target.dataset.action;

        if (type === "chat") {
          if (action === "rename") renameChat(id);
          else if (action === "delete") deleteChat(id);
          else if (action === "load") {
            if (e.altKey) {
              e.preventDefault();
              exportSingleChat(id);
            } else if (e.ctrlKey || e.metaKey) {
              const chat = chats.find((c) => c.id === id);

              // Filter out errors and local embed config messages to accurately reflect the API payload
              const apiMessages = chat.messages.filter(
                (m) =>
                  m.role !== "error" && !(m.role === "file" && m.mode === "embed"),
              );

              const text =
                `# ${chat.title}\n\n` +
                apiMessages
                  .map((m) => {
                    // Convert full "file" attachments into standard "user" role text
                    const roleLabel =
                      m.role === "file" ? "USER" : m.role.toUpperCase();
                    return `## ${roleLabel}\n${m.content || ""}\n\n`;
                  })
                  .join("");

              navigator.clipboard.writeText(text.trim()).then(() => {
                item.style.background = "#ccc";
                setTimeout(() => (item.style.background = ""), 150);
              });
            } else loadChat(id);
          }
        } else if (type === "file") {
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            toggleAdvancedRAGSettings(id);
            return;
          }

          if (action === "delete") deleteFile(id);
          else if (action === "embed") {
            const meta = files.find((f) => f.id === id);
            if (meta && meta.progress >= 100) {
              appendFileMessage(id, "embed");
            }
          } else if (action === "load") {
            if (e.altKey) {
              e.preventDefault();
              reuploadFile(id);
            } else {
              appendFileMessage(id, "full");
            }
          }
        }
      });

      $("#chat-container").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;
        const msgDiv = btn.closest(".msg");
        if (!msgDiv || !msgDiv.hasAttribute("data-index")) return;
        const index = parseInt(msgDiv.dataset.index, 10);
        if (isNaN(index)) return;

        const action = btn.dataset.action;

        if (action === "edit") startGlobalEdit(index);
        else if (action === "save-edit") saveGlobalEdit();
        else if (action === "cancel-edit") cancelGlobalEdit();
        else if (action === "toggle-wrap") toggleGlobalWrap();
        else if (action === "fork") forkChat(index);
        else if (action === "retry") retryMessage(index);
        else if (action === "delete") deleteMessage(index);
        else if (action === "run-embed") executeEmbedMessage(index);
      });

      $("#chat-container").addEventListener("change", (e) => {
        if (e.target.classList.contains("role-select")) {
          const msgDiv = e.target.closest(".msg");
          if (!msgDiv || !msgDiv.hasAttribute("data-index")) return;
          const index = parseInt(msgDiv.dataset.index, 10);
          if (isNaN(index)) return;

          const chat = chats.find((c) => c.id === currentChatId);

          chat.messages[index].role = e.target.value;
          saveState();
          renderApp(true);
        }
      });

      // --- KEYBOARD & CLIPBOARD LISTENERS ---
      $("#chat-input").addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          if (isSuperSecretSettingsOpen && activeSuperSecretSetting) {
            saveSuperSecretSetting();
          } else if (editingMessageIndex !== null) {
            saveGlobalEdit();
          } else {
            sendMessage(0, e.shiftKey);
          }
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.altKey && e.key.toLowerCase() === "t") {
          e.preventDefault();
          newChat();
          $("#chat-input").focus();
        }
        if (e.altKey && e.key.toLowerCase() === "w") {
          e.preventDefault();
          if (currentChatId) deleteChat(currentChatId);
        }
        if (e.altKey && e.key.toLowerCase() === "r") {
          e.preventDefault();
          if (currentChatId) renameChat(currentChatId);
        }
        if (e.altKey && e.key.toLowerCase() === "p") {
          e.preventDefault();
          toggleSidebar();
        }
        if (e.altKey && e.key.toLowerCase() === "o") {
          e.preventDefault();
          toggleTitle();
        }
        if (e.altKey && e.key.toLowerCase() === "i") {
          e.preventDefault();
          toggleSuperSecretSettings();
        }

        if (e.shiftKey && (e.key === "ArrowUp" || e.key === "ArrowDown")) {
          if (document.activeElement?.tagName === "TEXTAREA") return;
          e.preventDefault();
          const container = $("#chat-container");
          const msgs = Array.from(container.querySelectorAll(".msg"));
          if (!msgs.length) return;

          if (e.key === "ArrowDown") {
            const next = msgs.find((m) => m.offsetTop - 15 > container.scrollTop + 5);
            container.scrollTop = next ? next.offsetTop - 15 : container.scrollHeight;
          } else {
            const prev = msgs
              .slice()
              .reverse()
              .find((m) => m.offsetTop - 15 < container.scrollTop - 5);
            container.scrollTop = prev ? prev.offsetTop - 15 : 0;
          }
        }

        if (e.altKey && (e.key === "ArrowUp" || e.key === "ArrowDown")) {
          e.preventDefault();
          if (!chats.length) return;
          let idx = Math.max(
            0,
            chats.findIndex((c) => c.id === currentChatId),
          );
          if (e.key === "ArrowUp" && idx > 0) loadChat(chats[idx - 1].id);
          if (e.key === "ArrowDown" && idx < chats.length - 1)
            loadChat(chats[idx + 1].id);

          const activeChat = document.querySelector("#chat-list .chat-item.active");
          if (activeChat) activeChat.scrollIntoView({ block: "nearest" });
        }

        if (
          !e.shiftKey &&
          !e.altKey &&
          !e.ctrlKey &&
          !e.metaKey &&
          (e.key === "ArrowUp" || e.key === "ArrowDown")
        ) {
          const tag = document.activeElement?.tagName.toLowerCase();
          if (tag !== "input" && tag !== "textarea" && tag !== "select") {
            e.preventDefault();
            $("#chat-container").scrollBy({
              top: e.key === "ArrowDown" ? 150 : -150,
              behavior: "smooth",
            });
          }
        }
      });

      const toggleModifierMode = (e) => {
        if (e.key === "Control" || e.key === "Meta")
          document.body.classList.toggle("ctrl-down", e.type === "keydown");
        if (e.key === "Alt")
          document.body.classList.toggle("alt-down", e.type === "keydown");
      };
      window.addEventListener("keydown", toggleModifierMode);
      window.addEventListener("keyup", toggleModifierMode);
      window.addEventListener("blur", () => {
        document.body.classList.remove("ctrl-down");
        document.body.classList.remove("alt-down");
      });

      $("#chat-container").addEventListener("click", (e) => {
        if (!(e.ctrlKey || e.metaKey)) return;
        const target =
          e.target.closest(".katex") ||
          e.target.closest("pre") ||
          e.target.closest("code");
        if (!target) return;

        let text = target.classList.contains("katex")
          ? target.querySelector("annotation")?.textContent ||
            target.querySelector(".katex-mathml math")?.getAttribute("alttext") ||
            ""
          : target.innerText;

        if (text) {
          e.preventDefault();
          navigator.clipboard.writeText(text).then(() => {
            const bg = target.style.backgroundColor;
            target.style.backgroundColor = "#ccc";
            setTimeout(() => (target.style.backgroundColor = bg), 100);
          });
        }
      });

      // --- INITIALIZATION ---
      async function init() {
        config = (await dbGet("mf_config")) || {
          url: "https://api.openai.com/v1",
          key: "",
          models: "gpt-4o, gpt-4-turbo, gpt-3.5-turbo",
          godMode: false,
          lastModel: "",
        };

        for (const key in SETTING_DEFAULTS) {
          if (config[key] === undefined) {
            config[key] = SETTING_DEFAULTS[key].default;
          }
        }

        let oldChats = await dbGet("mf_chats");
        if (oldChats && Array.isArray(oldChats) && oldChats.length > 0) {
          chats = oldChats;
          await saveAllChats();
          await dbDelete("mf_chats");
        } else {
          const index = (await dbGet("mf_chat_index")) || [];
          chats = [];
          for (let idx of index) {
            let chatData = await dbGet(`mf_chat_${idx.id}`);
            if (chatData) chats.push(chatData);
            else chats.push({ id: idx.id, title: idx.title, messages: [] });
          }
        }

        files = (await dbGet("mf_files")) || [];
        currentChatId = (await dbGet("mf_current_chat_id")) || null;
        isSidebarHidden = (await dbGet("mf_sidebar_hidden")) === true;
        isTitleHidden = (await dbGet("mf_title_hidden")) === true;
        promptHeight = (await dbGet("mf_prompt_height")) || "";

        $("#cfg-url").value = config.url;
        $("#cfg-key").value = config.key;
        $("#cfg-models").value = config.models;
        $("#cfg-godmode").checked = config.godMode || false;

        updateModelDropdown();
        applySidebarState();
        applyTitleState();

        $("#chat-input").style.height = promptHeight;
        $("#chat-input").addEventListener("input", updateTokenCount);

        const textareaObserver = new ResizeObserver((entries) => {
          for (let entry of entries) {
            const h = entry.target.style.height;
            if (!h) continue;
            promptHeight = h;
            saveState();
          }
        });
        textareaObserver.observe($("#chat-input"));

        chats.sort((a, b) => Number(b.id) - Number(a.id));

        if (!currentChatId && chats.length > 0) currentChatId = chats[0].id;

        for (const f of files) {
          f._embeddingLoopActive = false; // Reset any stuck state from local storage on reload
          if (f.isEmbedding && f.progress < 100) {
            startEmbeddingLoop(f.id);
          } else if (f.progress >= 100) {
            f.isEmbedding = false;
          }
        }

        renderApp();
      }

      init();
    </script>
  </body>
</html>
